  async function doImportIngredients(overwrite){
    const input=document.createElement('input');input.type='file';input.accept='.csv,.txt';
    input.onchange=async()=>{
      if(!input.files.length) return;
      const text=await input.files[0].text();
      const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
      let added=0,updated=0,skipped=0;
      const existingIngs=await getIngredients();
      const existingMap={};existingIngs.forEach(i=>{existingMap[i.name.toLowerCase()]=i;});

      for(const line of lines){
        if(line.startsWith('===') || line.startsWith('---') || line.startsWith('Name;') || line.startsWith('\uFEFFName;')) continue;
        if(!line.includes(';')) continue;
        const parts=line.split(';').map(p=>p.trim());
        if(parts.length<2) continue;
        const name=parts[0];
        if(!name) continue;
        const unit=parts[1]||'kg';
        const price=parts[2]?parseFloat(parts[2].replace(',','.'))||0:0;
        const subcat=parts[3]||'';
        const abschnitt=parts[4]?parseFloat(parts[4].replace(',','.'))||0:0;
        // Neues Format (9 Spalten) enthält Kochfaktor; altes Format (8 Spalten) nicht
        const isNewFormat=parts.length>=9;
        const kochfaktor=isNewFormat?(parts[5]?parseFloat(parts[5].replace(',','.'))||1:1):1;
        const verarbHinweis=isNewFormat?(parts[6]||''):(parts[5]||'');
        const lagerHinweis=isNewFormat?(parts[7]||''):(parts[6]||'');
        const allergenStr=isNewFormat?(parts[8]||''):(parts[7]||'');
        const tagStr=isNewFormat?(parts[9]||''):'';
        if(subcat){
          const subs=await getSubcategories();
          if(!subs.find(s=>s.name===subcat)){try{await createSubcategory(subcat);}catch(e){}}
        }
        const existing=existingMap[name.toLowerCase()];
        if(existing&&!overwrite){skipped++;continue;}

        async function assignAllergens(ingId){
          if(allergenStr){
            const allergenNames=allergenStr.split(',').map(a=>a.trim()).filter(Boolean);
            const allergenIds=[];
            for(const an of allergenNames){
              let allAllergens=await getAllergens();let al=allAllergens.find(a=>a.name===an);
              if(!al){const aid=await createAllergen(an);allergenIds.push(aid);}else allergenIds.push(al.id);
            }
            if(allergenIds.length) await setIngredientAllergens(ingId,allergenIds);
          }
        }
        async function assignTags(ingId){
          if(tagStr){
            const tagNames=tagStr.split(',').map(t=>t.trim()).filter(Boolean);
            const tIds=[];
            for(const tn of tagNames){
              let allT=await getAllTags();let tag=allT.find(t=>t.name===tn);
              if(!tag){const tid=await createTag(tn);tIds.push(tid);}else tIds.push(tag.id);
            }
            if(tIds.length) await setIngredientTags(ingId,tIds);
          }
        }

        try{
          if(existing){
            await updateIngredient(existing.id,name,unit,price,subcat,verarbHinweis,lagerHinweis,abschnitt,kochfaktor);
            await assignAllergens(existing.id);
            await assignTags(existing.id);
            updated++;
          }else{
            const newId=await createIngredient(name,unit,price,subcat,verarbHinweis,lagerHinweis,abschnitt,kochfaktor);
            await assignAllergens(newId);
            await assignTags(newId);
            existingMap[name.toLowerCase()]={id:newId};
            added++;
          }
        }catch(e){skipped++;}
      }
      let msg=t('msg_import_complete_ings',added);
      if(updated) msg+=t('msg_import_updated_ings',updated);
      if(skipped) msg+=t('msg_import_skipped_ings',skipped);
      alert(msg);
      await refreshCatFilter();
      renderTable();
    };
    input.click();
  }

  renderTable();
}

let stdMealSelectedId=null;

function showMealTypeCatsDialog(onClose){
  const content=h('div',{});
  content.appendChild(h('h2',{},t('dlg_meal_type_cats')));
  content.appendChild(h('div',{style:{fontSize:'12px',color:'var(--text-muted)',marginBottom:'12px'}},t('dlg_meal_type_cats_hint')));
  const addRow=h('div',{style:{display:'flex',gap:'8px',marginBottom:'12px'}});
  const newInput=h('input',{type:'text',placeholder:t('ph_meal_cat'),style:{flex:1}});
  addRow.append(newInput,h('button',{class:'btn btn-accent btn-sm',onClick:async()=>{
    const v=newInput.value.trim();if(!v) return;
    try{await createMealTypeCategory(v);}catch(e){alert(t('msg_cat_exists'));}
    newInput.value='';refreshList();
  }},'+'));
  content.appendChild(addRow);
  const listDiv2=h('div',{});content.appendChild(listDiv2);
  content.appendChild(h('div',{style:{marginTop:'16px',textAlign:'center'}},h('button',{class:'btn btn-surface',onClick:()=>{closeModal(modal);if(onClose)onClose();}},t('btn_close'))));
  const modal=showModal(content);
  async function refreshList(){
    listDiv2.innerHTML='';
    const cats=await getMealTypeCategories();
    cats.forEach((c,idx)=>{
      const row=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid var(--border)'}});
      const leftPart=h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}});
      const arrows=h('div',{style:{display:'flex',flexDirection:'column',gap:'2px'}});
      if(idx>0) arrows.appendChild(h('button',{class:'btn-icon btn-ghost',style:{width:'20px',height:'16px',fontSize:'10px'},onClick:async()=>{
        const prev=cats[idx-1];const tmpOrder=c.sort_order;
        await updateMealTypeCategory(c.id,c.name,prev.sort_order);
        await updateMealTypeCategory(prev.id,prev.name,tmpOrder);
        refreshList();
      }},'▲'));
      if(idx<cats.length-1) arrows.appendChild(h('button',{class:'btn-icon btn-ghost',style:{width:'20px',height:'16px',fontSize:'10px'},onClick:async()=>{
        const next=cats[idx+1];const tmpOrder=c.sort_order;
        await updateMealTypeCategory(c.id,c.name,next.sort_order);
        await updateMealTypeCategory(next.id,next.name,tmpOrder);
        refreshList();
      }},'▼'));
      const nameEl=h('span',{style:{fontSize:'13px',fontWeight:'600'}},mealTypeCatDisplayName(c));
      if(c.name_en) nameEl.appendChild(h('span',{style:{color:'var(--text-muted)',fontSize:'11px',fontWeight:'400',marginLeft:'6px'}},'('+c.name_en+')'));
      leftPart.append(arrows,nameEl);
      row.appendChild(leftPart);
      const btns=h('div',{style:{display:'flex',gap:'4px'}});
      btns.appendChild(h('button',{class:'btn-icon btn-ghost',onClick:()=>{
        const nameIn=h('input',{type:'text',value:c.name,style:{width:'100%'}});
        const nameEnIn=h('input',{type:'text',placeholder:t('ph_name_en'),value:c.name_en||'',style:{width:'100%'}});
        const sub=showModal(h('div',{},
          h('h2',{},t('btn_edit')),
          h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_name')),nameIn),
          h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_name_en')),nameEnIn),
          h('div',{class:'modal-buttons'},
            h('button',{class:'btn btn-accent',onClick:async()=>{
              const n=nameIn.value.trim();if(!n) return;
              await updateMealTypeCategory(c.id,n,c.sort_order,nameEnIn.value.trim());closeModal(sub);refreshList();
            }},t('btn_save')),
            h('button',{class:'btn btn-surface',onClick:()=>closeModal(sub)},t('btn_cancel'))
          )
        ));
      }},'✎'));
      btns.appendChild(h('button',{class:'btn-icon btn-danger',onClick:async()=>{
        if(confirm(t('msg_confirm_delete_subcategory',c.name))){await deleteMealTypeCategory(c.id);refreshList();}
      }},'✕'));
      row.appendChild(btns);
      listDiv2.appendChild(row);
    });
    if(!cats.length) listDiv2.appendChild(h('div',{class:'empty-msg'},t('empty_no_cat_list')));
  }
  refreshList();
}

async function renderStandardMealsPage(container){
  const header=h('div',{class:'page-header'},h('h1',{},t('page_standard_meals')),
    h('div',{style:{display:'flex',gap:'8px'}},
      h('button',{class:'btn btn-surface',onClick:()=>showMealTypeCatsDialog(refresh)},t('btn_manage_categories')),
      h('button',{class:'btn btn-accent',onClick:addMealDialog},'+  '+t('page_standard_meals'))
    ));
  const body=h('div',{class:'page-body'});
  container.append(header,body);

  const cols=h('div',{class:'two-col'});
  const listDiv=h('div',{class:'col-left'});
  const detailDiv=h('div',{class:'col-right'});
  cols.append(listDiv,detailDiv);
  body.appendChild(cols);

  async function refresh(){
    listDiv.innerHTML='';detailDiv.innerHTML='';
    const mealTypeCats=await getMealTypeCategories();
    const mealTypeEnMap={};if(LANG==='en'){mealTypeCats.forEach(c=>{if(c.name_en) mealTypeEnMap[c.name]=c.name_en;});}
    const meals=await getStandardMeals();

    if(!mealTypeCats.length){
      listDiv.appendChild(h('div',{class:'empty-msg'},t('empty_no_std_meal_cats')));
      return;
    }

    // Group meals by meal_type category
    mealTypeCats.forEach(cat=>{
      const catMeals=meals.filter(m=>m.meal_type===cat.name);
      const groupHeader=h('div',{style:{fontWeight:'700',fontSize:'13px',color:'var(--accent)',padding:'10px 12px 4px',borderBottom:'1px solid var(--border)'}},mealTypeCatDisplayName(cat));
      listDiv.appendChild(groupHeader);

      if(!catMeals.length){
        listDiv.appendChild(h('div',{style:{padding:'6px 12px',fontSize:'12px',color:'var(--text-muted)',fontStyle:'italic'}},t('empty_no_std_meals_in_cat')));
      } else {
        catMeals.forEach(m=>{
          const isSel=m.id===stdMealSelectedId;
          const item=h('div',{class:`list-item ${isSel?'active':''}`,style:{display:'flex',alignItems:'center',gap:'8px'}});
          const cb=h('input',{type:'checkbox',title:'Aktiv für Bestellliste'});
          cb.checked=!!m.is_active;
          cb.addEventListener('change',async(e)=>{
            if(cb.checked){
              // Deactivate all other meals in this category
              for(const other of catMeals){
                if(other.id!==m.id&&other.is_active){
                  const rec=await dbGet('standard_meals',other.id);
                  if(rec){rec.is_active=0;await dbPut('standard_meals',rec);}
                }
              }
              const rec=await dbGet('standard_meals',m.id);
              if(rec){rec.is_active=1;await dbPut('standard_meals',rec);}
            } else {
              const rec=await dbGet('standard_meals',m.id);
              if(rec){rec.is_active=0;await dbPut('standard_meals',rec);}
            }
            refresh();
          });
          item.appendChild(cb);
          const textDiv=h('div',{style:{flex:1,cursor:'pointer'},onClick:()=>{stdMealSelectedId=m.id;refresh();}});
          textDiv.appendChild(h('div',{class:'item-name',style:{fontSize:'13px'}},m.name));
          if(m.is_active) textDiv.appendChild(h('div',{style:{fontSize:'10px',color:'var(--green-light)',fontWeight:'600'}},t('recipe_active_badge')));
          item.appendChild(textDiv);
          listDiv.appendChild(item);
        });
      }
    });

    // Orphaned meals (meal_type no longer in categories)
    const catNames=new Set(mealTypeCats.map(c=>c.name));
    const orphaned=meals.filter(m=>!catNames.has(m.meal_type));
    if(orphaned.length){
      listDiv.appendChild(h('div',{style:{fontWeight:'700',fontSize:'13px',color:'var(--text-muted)',padding:'10px 12px 4px',borderBottom:'1px solid var(--border)'}},t('std_meal_orphaned')));
      orphaned.forEach(m=>{
        const isSel=m.id===stdMealSelectedId;
        const item=h('div',{class:`list-item ${isSel?'active':''}`,onClick:()=>{stdMealSelectedId=m.id;refresh();}});
        item.appendChild(h('div',{class:'item-name'},m.name));
        item.appendChild(h('div',{class:'item-meta',style:{color:'var(--accent)'}},t('std_meal_cat_missing',m.meal_type)));
        listDiv.appendChild(item);
      });
    }

    // Detail view
    const meal=meals.find(m=>m.id===stdMealSelectedId);
    if(!meal){detailDiv.appendChild(h('div',{class:'empty-msg'},t('empty_select_std_meal')));return;}

    const card=h('div',{class:'card'});
    const top=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}});
    top.appendChild(h('span',{style:{fontSize:'16px',fontWeight:'700'}},meal.name));
    const topBtns=h('div',{style:{display:'flex',gap:'8px'}});
    topBtns.appendChild(h('button',{class:'btn btn-surface btn-sm',onClick:()=>addComponentDialog(meal.id)},t('btn_add_subcategory_btn')));
    topBtns.appendChild(h('button',{class:'btn btn-surface btn-sm',onClick:()=>editMealDialog(meal)},t('btn_edit')));
    topBtns.appendChild(h('button',{class:'btn btn-danger btn-sm',onClick:async()=>{if(confirm(t('msg_confirm_delete_standard_meal'))){await deleteStandardMeal(meal.id);stdMealSelectedId=null;refresh();}}},t('btn_delete')));
    top.appendChild(topBtns);
    card.appendChild(top);
    card.appendChild(h('div',{style:{fontSize:'12px',color:'var(--text-muted)',marginBottom:'12px'}},t('std_meal_detail_meta',mealTypeEnMap[meal.meal_type]||meal.meal_type,meal.is_active?t('std_meal_active_suffix'):'')));

    if(!meal.components.length){card.appendChild(h('div',{class:'empty-msg'},t('empty_no_std_meal_components')));}
    else {
      const tHdr=h('div',{class:'table-header'});
      [[t('col_category'),180],[t('col_qty_per_100'),100],[t('col_unit'),80],[t('col_price_per_unit'),100]].forEach(([lbl,w])=>tHdr.appendChild(h('span',{style:{width:w+'px',flexShrink:0}},lbl)));
      tHdr.appendChild(h('span',{style:{flex:1}}));
      card.appendChild(tHdr);
      for(const c of meal.components){
        const ppu=c.price_per_unit||0;
        const row=h('div',{class:'table-row'});
        row.appendChild(h('span',{style:{width:'180px',flexShrink:0,fontSize:'13px',fontWeight:'600',color:'var(--green-light)'}},c.subcategory||'—'));
        row.appendChild(h('span',{style:{width:'100px',flexShrink:0,fontSize:'14px'}},String(c.quantity_per_100)));
        row.appendChild(h('span',{style:{width:'80px',flexShrink:0,color:'var(--text-muted)'}},c.unit));
        row.appendChild(h('span',{style:{width:'100px',flexShrink:0,color:ppu?'var(--text)':'var(--text-muted)'}},ppu?`${ppu.toFixed(2)} €`:'—'));
        const btnGroup=h('span',{style:{marginLeft:'auto',display:'flex',gap:'4px'}});
        btnGroup.appendChild(h('button',{class:'btn-icon btn-ghost',onClick:()=>editComponentDialog(c)},'✎'));
        btnGroup.appendChild(h('button',{class:'btn-icon btn-danger',onClick:async()=>{await removeMealComponent(c.id);refresh();}},'✕'));
        row.appendChild(btnGroup);
        card.appendChild(row);
      }
    }
    detailDiv.appendChild(card);
  }

  async function addMealDialog(){
    const mealTypes=await getMealTypeNames();
    if(!mealTypes.length){alert(t('msg_please_add_meal_cats'));return;}
    const nameInput=h('input',{type:'text',placeholder:t('ph_meal_name'),style:{width:'100%'}});
    const typeSel=h('select',{style:{width:'100%'}});
    mealTypes.forEach(mt=>typeSel.appendChild(h('option',{value:mt},mt)));
    const modal=showModal(h('div',{},
      h('h2',{},t('dlg_new_std_meal')),
      h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_name')),nameInput),
      h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_meal_category')),typeSel),
      h('div',{class:'modal-buttons'},
        h('button',{class:'btn btn-surface',onClick:()=>closeModal(modal)},t('btn_cancel')),
        h('button',{class:'btn btn-accent',onClick:async()=>{
          if(!nameInput.value.trim()) return;
          const id=await createStandardMeal(typeSel.value,nameInput.value.trim());
          stdMealSelectedId=id;closeModal(modal);refresh();
        }},t('btn_create'))
      )
    ));
  }

  async function editMealDialog(meal){
    const mealTypes=await getMealTypeNames();
    const nameInput=h('input',{type:'text',value:meal.name,style:{width:'100%'}});
    const typeSel=h('select',{style:{width:'100%'}});
    mealTypes.forEach(mt=>{const o=h('option',{value:mt},mt);if(mt===meal.meal_type)o.selected=true;typeSel.appendChild(o);});
    const modal=showModal(h('div',{},
      h('h2',{},t('dlg_edit_std_meal')),
      h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_name')),nameInput),
      h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_meal_category')),typeSel),
      h('div',{class:'modal-buttons'},
        h('button',{class:'btn btn-surface',onClick:()=>closeModal(modal)},t('btn_cancel')),
        h('button',{class:'btn btn-accent',onClick:async()=>{
          if(!nameInput.value.trim()) return;
          await updateStandardMeal(meal.id,nameInput.value.trim(),typeSel.value);
          closeModal(modal);refresh();
        }},t('btn_save'))
      )
    ));
  }

  async function addComponentDialog(mealId){
    const subcats=await getSubcategories();
    if(!subcats.length){alert(t('msg_no_subcats'));return;}
    const subcatSel=h('select',{style:{width:'100%'}});
    subcats.forEach(s=>subcatSel.appendChild(h('option',{value:s.name},s.name)));
    const qtyInput=h('input',{type:'number',placeholder:'z.B. 25',style:{width:'100%'}});
    const uSel=unitSelect('kg');uSel.style.width='100%';
    const priceInput=h('input',{type:'number',placeholder:'0.00',step:'0.01',style:{width:'100%'}});

    const modal=showModal(h('div',{},
      h('h2',{},t('dlg_add_component')),
      h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_category')),subcatSel),
      h('div',{class:'form-row'},
        h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_qty_per_100')),qtyInput),
        h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_unit')),uSel)
      ),
      h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_price_per_unit_euro')),priceInput),
      h('div',{class:'modal-buttons'},
        h('button',{class:'btn btn-surface',onClick:()=>closeModal(modal)},t('btn_cancel')),
        h('button',{class:'btn btn-accent',onClick:async()=>{
          const qty=parseFloat(qtyInput.value);if(!qty||qty<=0) return;
          const ppu=parseFloat(priceInput.value)||0;
          await addMealComponent(mealId,0,qty,uSel.value,subcatSel.value,ppu);
          closeModal(modal);refresh();
        }},t('btn_add'))
      )
    ));
  }

  async function editComponentDialog(comp){
    const subcats=await getSubcategories();
    const subcatSel=h('select',{style:{width:'100%'}});
    subcats.forEach(s=>{const o=h('option',{value:s.name},s.name);if(s.name===comp.subcategory)o.selected=true;subcatSel.appendChild(o);});
    const qtyInput=h('input',{type:'number',value:comp.quantity_per_100,style:{width:'100%'}});
    const uSel=unitSelect(comp.unit);uSel.style.width='100%';
    const priceInput=h('input',{type:'number',value:comp.price_per_unit||'',placeholder:'0.00',step:'0.01',style:{width:'100%'}});

    const modal=showModal(h('div',{},
      h('h2',{},t('dlg_edit_component')),
      h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_category')),subcatSel),
      h('div',{class:'form-row'},
        h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_qty_per_100')),qtyInput),
        h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_unit')),uSel)
      ),
      h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_price_per_unit_euro')),priceInput),
      h('div',{class:'modal-buttons'},
        h('button',{class:'btn btn-surface',onClick:()=>closeModal(modal)},t('btn_cancel')),
        h('button',{class:'btn btn-accent',onClick:async()=>{
          const qty=parseFloat(qtyInput.value);if(!qty||qty<=0) return;
          const ppu=parseFloat(priceInput.value)||0;
          await updateMealComponent(comp.id,qty,uSel.value,subcatSel.value,ppu);
          closeModal(modal);refresh();
        }},t('btn_save'))
      )
    ));
  }

  refresh();
}

async function getPortionSummary(dayIds){
  const byType={};
  let total=0;
  for(const did of dayIds){
    const slots=await getMealSlots(did);
    for(const slot of slots){
      byType[slot.meal_type]=(byType[slot.meal_type]||0)+slot.portion_count;
      total+=slot.portion_count;
    }
  }
  return {byType,total};
}

async function renderGeneralOrderPage(container){
  let lastItems=[];
  const header=h('div',{class:'page-header'},h('h1',{},t('page_general_order')),
    h('div',{style:{display:'flex',gap:'8px'}},
      h('button',{class:'btn btn-surface',onClick:async()=>{
        if(!lastItems.length){alert(t('msg_no_data_export'));return;}
        const action=await dbGet('actions',selectedActionId);
        const aName=action?action.name:'';
        const m=showModal(h('div',{},
          h('h2',{},t('dlg_export_general')),
          h('div',{class:'modal-buttons'},
            h('button',{class:'btn btn-surface',onClick:()=>{downloadFile('Grundbedarfe.txt',exportGeneralOrderTxt(lastItems,aName));closeModal(m);}},t('btn_export_txt')),
            h('button',{class:'btn btn-surface',onClick:()=>{downloadFile('Grundbedarfe.csv',exportGeneralOrderCsv(lastItems,aName),'text/csv');closeModal(m);}},t('btn_export_csv')),
            h('button',{class:'btn btn-surface',onClick:()=>closeModal(m)},t('btn_cancel'))
          )
        ));
      }},'Export'),
      h('button',{class:'btn btn-surface',onClick:()=>showPage('standard_meals')},t('btn_standard_meals'))
    ));
  const body=h('div',{class:'page-body'});
  container.append(header,body);

  body.innerHTML='';
  if(!selectedActionId){body.appendChild(h('div',{class:'empty-msg'},t('empty_no_action_for_order')));return;}
  const dayIds=await getDayIds();
  if(!dayIds.length){body.appendChild(h('div',{class:'empty-msg'},t('empty_no_days_for_order')));return;}

  // Portion summary
  const ps=await getPortionSummary(dayIds);
  const mealTypeEnMap={};if(LANG==='en'){(await getMealTypeCategories()).forEach(c=>{if(c.name_en) mealTypeEnMap[c.name]=c.name_en;});}
  const summaryCard=h('div',{class:'card',style:{marginBottom:'12px'}});
  const summaryTop=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'8px'}});
  const portionChips=h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}});
  Object.entries(ps.byType).sort().forEach(([type,count])=>{
    portionChips.appendChild(h('span',{class:'chip',style:{fontSize:'12px'}},`${mealTypeEnMap[type]||type}: ${count} Port.`));
  });
  portionChips.appendChild(h('span',{style:{fontWeight:'700',fontSize:'13px',marginLeft:'4px'}},t('order_total_portions',ps.total)));
  summaryTop.appendChild(portionChips);
  summaryCard.appendChild(summaryTop);
  body.appendChild(summaryCard);

  // Generate order
  const items=await generateGeneralOrder(dayIds);
  lastItems=items;
  if(!items.length){body.appendChild(h('div',{class:'empty-msg'},t('empty_no_positions')));return;}
  renderGeneralOrderList(body,items);
}

// General order: category-level aggregation
function renderGeneralOrderList(parent,items){
  const total=items.reduce((s,i)=>s+i.total_cost,0);
  const summary=h('div',{class:'card',style:{display:'flex',justifyContent:'space-between',alignItems:'center'}});
  summary.appendChild(h('span',{style:{color:'var(--text-muted)'}},t('order_cat_positions_count',items.length)));
  summary.appendChild(h('span',{style:{fontWeight:'700',fontSize:'14px'}},t('order_total_cost',total.toFixed(2))));
  parent.appendChild(summary);

  // Group entries that share the same subcategory (but may differ in unit)
  const groups={};
  items.forEach(i=>{const cat=i.subcategory||'Sonstiges';(groups[cat]=groups[cat]||[]).push(i);});

  Object.keys(groups).sort().forEach(cat=>{
    const catItems=groups[cat];
    const catTotal=catItems.reduce((s,i)=>s+i.total_cost,0);
    const catLabel=LANG==='en'?(catItems[0].subcategory_en||cat):cat;
    const grp=h('div',{class:'cat-group'});
    const ghdr=h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'4px'}});
    ghdr.appendChild(h('span',{class:'cat-name'},catLabel));
    ghdr.appendChild(h('span',{class:'cat-meta'},`${catTotal.toFixed(2)} €`));
    grp.appendChild(ghdr);
    catItems.forEach(item=>{
      const row=h('div',{style:{display:'flex',alignItems:'center',padding:'4px 0'}});
      row.appendChild(h('span',{style:{width:'120px',fontSize:'14px',fontWeight:'600'}},String(round2(item.quantity))));
      row.appendChild(h('span',{style:{width:'60px',color:'var(--text-muted)',fontSize:'13px'}},item.unit));
      row.appendChild(h('span',{style:{marginLeft:'auto',color:'var(--text-muted)'}},item.total_cost?`${item.total_cost.toFixed(2)} €`:'—'));
      grp.appendChild(row);
    });
    parent.appendChild(grp);
  });
}

// Special order: ingredient-level detail
function renderOrderList(parent,items){
  const total=items.reduce((s,i)=>s+i.quantity*i.price,0);
  const summary=h('div',{class:'card',style:{display:'flex',justifyContent:'space-between',alignItems:'center'}});
  summary.appendChild(h('span',{style:{color:'var(--text-muted)'}},t('order_positions_count',items.length)));
  summary.appendChild(h('span',{style:{fontWeight:'700',fontSize:'14px'}},t('order_total_cost',total.toFixed(2))));
  parent.appendChild(summary);

  const groups={};
  items.forEach(i=>{const cat=i.subcategory||'Sonstiges';(groups[cat]=groups[cat]||[]).push(i);});

  Object.keys(groups).sort().forEach(cat=>{
    const catItems=groups[cat];
    const catTotal=catItems.reduce((s,i)=>s+i.quantity*i.price,0);
    const catLabel=LANG==='en'?(catItems[0].subcategory_en||cat):cat;
    const grp=h('div',{class:'cat-group'});
    const ghdr=h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'4px'}});
    ghdr.appendChild(h('span',{class:'cat-name'},catLabel));
    ghdr.appendChild(h('span',{class:'cat-meta'},t('order_articles_cost',catItems.length,catTotal.toFixed(2))));
    grp.appendChild(ghdr);
    catItems.forEach(item=>{
      const row=h('div',{style:{display:'flex',alignItems:'center',padding:'2px 0',opacity:item.optional?'0.6':'1',fontStyle:item.optional?'italic':'normal'}});
      const nameEl=h('span',{style:{width:'200px',fontSize:'13px'}});
      nameEl.appendChild(document.createTextNode(LANG==='en'?(item.name_en||item.name):item.name));
      if(item.optional) nameEl.appendChild(h('span',{style:{fontSize:'10px',marginLeft:'6px',color:'var(--accent)',fontWeight:'600'}},'('+t('misc_optional')+')'));
      row.appendChild(nameEl);
      row.appendChild(h('span',{style:{width:'80px'}},String(round2(item.quantity))));
      row.appendChild(h('span',{style:{width:'60px',color:'var(--text-muted)'}},item.unit));
      row.appendChild(h('span',{style:{marginLeft:'auto',color:'var(--text-muted)'}},item.price?`${(item.quantity*item.price).toFixed(2)} €`:'—'));
      grp.appendChild(row);
    });
    parent.appendChild(grp);
  });
}

function exportGeneralOrderTxt(items,actionName){
  let t=`=== ${LANG==='en'?'BASIC NEEDS':'GRUNDBEDARFE'} ===\n`;
  if(actionName) t+=`${LANG==='en'?'Event':'Veranstaltung'}: ${actionName}\n`;
  const total=items.reduce((s,i)=>s+i.total_cost,0);
  t+=`${LANG==='en'?'Total':'Gesamt'}: ${total.toFixed(2)} €\n\n`;
  const groups={};
  items.forEach(i=>{const cat=i.subcategory||(LANG==='en'?'Other':'Sonstiges');(groups[cat]=groups[cat]||[]).push(i);});
  Object.keys(groups).sort().forEach(cat=>{
    const catItems=groups[cat];
    const catTotal=catItems.reduce((s,i)=>s+i.total_cost,0);
    const catLabel=LANG==='en'?(catItems[0].subcategory_en||cat):cat;
    t+=`--- ${catLabel} (${catTotal.toFixed(2)} €) ---\n`;
    catItems.forEach(i=>{
      t+=`  ${round2(i.quantity)} ${i.unit}`;
      if(i.total_cost) t+=`  —  ${i.total_cost.toFixed(2)} €`;
      t+='\n';
    });
    t+='\n';
  });
  t+=`=== ${LANG==='en'?'END':'ENDE'} ===\n`;
  return t;
}

function exportSpecialOrderTxt(items,actionName){
  let t=`=== ${LANG==='en'?'SHOPPING LIST BY RECIPE':'EINKAUFSLISTE NACH REZEPT'} ===\n`;
  if(actionName) t+=`${LANG==='en'?'Event':'Veranstaltung'}: ${actionName}\n`;

  const groups={};
  items.forEach(i=>{const cat=i.subcategory||(LANG==='en'?'Other':'Sonstiges');(groups[cat]=groups[cat]||[]).push(i);});
  Object.keys(groups).sort().forEach(cat=>{
    const catItems=groups[cat];
    const catTotal=catItems.reduce((s,i)=>s+i.quantity*(i.price||0),0);
    const catLabel=LANG==='en'?(catItems[0].subcategory_en||cat):cat;
    t+=`--- ${catLabel} (${catTotal.toFixed(2)} €) ---\n`;
    catItems.forEach(i=>{
      const iName=LANG==='en'?(i.name_en||i.name):i.name;
      t+=`  ${iName}; ${round2(i.quantity)} ${i.unit}`;
      if(i.price) t+=`  —  ${(i.quantity*i.price).toFixed(2)} €`;
      t+='\n';

}

function exportGeneralOrderCsv(items,actionName){
  const hEv=LANG==='en'?'Event':'Veranstaltung';
  const hCat=LANG==='en'?'Category':'Kategorie';
  const hQty=LANG==='en'?'Quantity':'Menge';
  const hUnit=LANG==='en'?'Unit':'Einheit';
  const hCost=LANG==='en'?'Cost':'Preis';
  const hTotal=LANG==='en'?'Total':'Gesamt';
  let t=`\uFEFF${hEv};${hCat};${hQty};${hUnit};${hCost}\n`;
  items.forEach(i=>{
    const catLabel=LANG==='en'?(i.subcategory_en||i.subcategory||(LANG==='en'?'Other':'Sonstiges')):(i.subcategory||'Sonstiges');
    t+=`${actionName||''};${catLabel};${String(round2(i.quantity)).replace('.',',')};${i.unit};${i.total_cost?String(i.total_cost.toFixed(2)).replace('.',','):''}\n`;
  });
  const total=items.reduce((s,i)=>s+i.total_cost,0);
  t+=`;;${hTotal};;${String(total.toFixed(2)).replace('.',',')}\n`;
  return t;
}

function exportSpecialOrderCsv(items,actionName){
  const hEv=LANG==='en'?'Event':'Veranstaltung';
  const hCat=LANG==='en'?'Category':'Kategorie';
  const hIng=LANG==='en'?'Ingredient':'Zutat';
  const hQty=LANG==='en'?'Quantity':'Menge';
  const hUnit=LANG==='en'?'Unit':'Einheit';
  const hCost=LANG==='en'?'Cost':'Preis';
  const hTotal=LANG==='en'?'Total':'Gesamt';
  let t=`\uFEFF${hEv};${hCat};${hIng};${hQty};${hUnit};${hCost}\n`;
  items.forEach(i=>{
    const iName=LANG==='en'?(i.name_en||i.name):i.name;
    const catLabel=LANG==='en'?(i.subcategory_en||i.subcategory||'Other'):(i.subcategory||'Sonstiges');
    const cost=i.quantity*(i.price||0);
    t+=`${actionName||''};${catLabel};${iName};${String(round2(i.quantity)).replace('.',',')};${i.unit};${cost?String(cost.toFixed(2)).replace('.',','):''}\n`;
  });
  const total=items.reduce((s,i)=>s+i.quantity*(i.price||0),0);
  t+=`;;;${hTotal};;${String(total.toFixed(2)).replace('.',',')}\n`;
  return t;
}

function downloadFile(filename,text,type='text/plain'){
  const blob=new Blob([text],{type:type+';charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}

    listDiv.innerHTML='';

    if(cf==='__none__') recipes=recipes.filter(r=>!r.categories.length);

    if(!recipes.length){listDiv.appendChild(h('div',{class:'empty-msg'},t('empty_no_recipes')));return;}

      listDiv.appendChild(item);
    });
  }

          row.appendChild(h('span',{style:{width:'110px',flexShrink:0,color:'var(--text-muted)',fontStyle:i.preparation?'normal':'italic'}},prepLabel));
          row.appendChild(h('span',{style:{width:'70px',flexShrink:0}},String(i.quantity_per_person)));
          row.appendChild(h('span',{style:{width:'60px',flexShrink:0,color:'var(--text-muted)'}},i.unit));
          const ab=i.ingredient_abschnitt||0;
          const netto=i.quantity_per_person*(1-ab/100);
          if(hasAbschnitt){
            row.appendChild(h('span',{style:{width:'80px',flexShrink:0,color:ab>0?'var(--green)':'var(--text-muted)'}},ab>0?`${round2(netto)} ${i.unit}`:'—'));
          }
          if(hasKochfaktor){
            const kf=i.ingredient_kochfaktor||1;

      rowEl.addEventListener('dragleave',()=>{rowEl.style.borderTop='';});
      rowEl.addEventListener('drop',e=>{
        e.preventDefault();rowEl.style.borderTop='';

        optionalRef.value=!optionalRef.value;

      function openSubIngSearch(sDisplay,sub){
        const searchInput2=h('input',{type:'text',placeholder:t('ph_ingredient_search'),style:{flex:1}});

        const popup2=showModal(h('div',{},

      rowEl.append(dragHandle,optBadge,display,prepSel,qtyInput,unitLabel,subToggle,removeBtn);

    function openIngSearch(display,ingIdRef,unitLabel,unitRef){

    const allergenHinweisInput=h('input',{type:'text',placeholder:t('ph_allergen_hint'),value:recipe?.allergen_hinweis||'',style:{width:'100%'}});

      h('label',{class:'form-label'},t('lbl_allergens_extra')),allergenFrame));
    content.appendChild(h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_allergen_note')),allergenHinweisInput));

    content.appendChild(h('div',{class:'form-group',style:{marginTop:'16px'}},h('label',{class:'form-label'},t('lbl_preparation')),zubereitungArea));

    // Hinweis
    const hinweisArea=h('textarea',{placeholder:t('ph_hints_variations'),style:{width:'100%',minHeight:'80px',resize:'vertical'}});
    if(recipe?.hinweis) hinweisArea.value=recipe.hinweis;
    content.appendChild(h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_note')),hinweisArea));

        const n=nameInput.value.trim();if(!n){alert(t('msg_please_enter_name'));return;}

        if(recipe){await updateRecipe(recipe.id,n,descInput.value.trim(),catIds,ingsData,extra);recipeSelectedId=recipe.id;}
        else{const id=await createRecipe(n,descInput.value.trim(),catIds,ingsData,extra);recipeSelectedId=id;}

        {name:'Tasse (Cup)',factor:0.24,unit:'L'},
        {name:'Schnapsglas (2cl)',factor:0.02,unit:'L'},
        {name:'Messbecher (¼ L)',factor:0.25,unit:'L'},
        {name:'Pint',factor:0.47,unit:'L'},
        {name:'Quart',factor:0.946,unit:'L'},
        {name:'Gallon',factor:3.785,unit:'L'},
        {name:'Fluid Ounce (fl oz)',factor:0.02957,unit:'L'},
        {name:'Milliliter (ml)',factor:0.001,unit:'L'},
        {name:'Zentiliter (cl)',factor:0.01,unit:'L'},
        {name:'Deziliter (dl)',factor:0.1,unit:'L'},

      {group:'Gewicht → kg',items:[

        {name:'Tasse Mehl',factor:0.13,unit:'kg'},
        {name:'Tasse Zucker',factor:0.2,unit:'kg'},

        {name:'Prise',factor:0.0003,unit:'kg'},
        {name:'Messerspitze',factor:0.001,unit:'kg'},
        {name:'Gramm (g)',factor:0.001,unit:'kg'},
        {name:'Pfund (500g)',factor:0.5,unit:'kg'},
        {name:'Unze (oz)',factor:0.02835,unit:'kg'},
        {name:'Pound (lb)',factor:0.4536,unit:'kg'},

        {name:'Karotte (mittel)',factor:0.1,unit:'kg'},
        {name:'Tomate (mittel)',factor:0.12,unit:'kg'},
        {name:'Apfel (mittel)',factor:0.15,unit:'kg'},

    ];
    const flatConv=[];

      convFrom.appendChild(h('option',{value:'',disabled:true,style:{fontWeight:'700',color:'var(--accent)'}},`── ${g.group} ──`));
      g.items.forEach(c=>{convFrom.appendChild(h('option',{value:c.name},c.name));flatConv.push(c);});

    convFrom.value=flatConv[0].name;
    function updateConv(){
      const val=parseFloat(convInput.value)||0;

    const mainDiv=h('div',{class:'modal-main'});

  function exportRecipe(recipe){

  async function duplicateRecipe(recipe){
    const catIds=recipe.categories.map(c=>c.id);
    const ingsData=recipe.ingredients.map(i=>({ingredient_id:i.ingredient_id,quantity_per_person:i.quantity_per_person,unit:i.unit,preparation:i.preparation||'',optional:i.optional||false,substitutes:(i.substitutes||[]).map(s=>({ingredient_id:s.ingredient_id,quantity_per_person:s.quantity_per_person,unit:s.unit,preparation:s.preparation||''}))}));
    const extra={name_en:recipe.name_en||'',description_en:recipe.description_en||'',zubereitung_zeit:recipe.zubereitung_zeit||'',garzeit:recipe.garzeit||'',zubereitung:recipe.zubereitung||'',hinweis:recipe.hinweis||'',allergen_hinweis:recipe.allergen_hinweis||'',is_allergy_friendly:recipe.is_allergy_friendly||false,allergenIds:recipe.manualAllergenIds||[],tagIds:(recipe.tags||[]).map(t=>t.id)};
    const newId=await createRecipe(recipe.name+t('recipe_copy_suffix'),recipe.description||'',catIds,ingsData,extra);

        h('button',{class:'btn btn-accent',onClick:()=>{closeModal(modal);doImportRecipes(true);}},t('btn_overwrite_existing')),
        h('button',{class:'btn btn-surface',onClick:()=>closeModal(modal)},t('btn_cancel'))
      )
    ));
  }
  async function doImportRecipes(overwrite){
    const input=document.createElement('input');input.type='file';input.accept='.txt';input.multiple=true;
    input.onchange=async()=>{
      let totalAdded=0,totalUpdated=0,totalSkipped=0;
      for(const file of input.files){
        const text=await file.text();
        const {added,updated,skipped}=await importRecipeFromText(text,overwrite);
        totalAdded+=added;totalUpdated+=updated;totalSkipped+=skipped;
      }
      let msg=t('msg_import_complete_recipes',totalAdded);
      if(totalUpdated) msg+=t('msg_import_updated_recipes',totalUpdated);
      if(totalSkipped) msg+=t('msg_import_skipped_recipes',totalSkipped);
      alert(msg);
      renderList();renderDetail();
    };
    input.click();
  }

  async function managePreparationMethods(){
    const content=h('div',{});
    content.appendChild(h('h2',{},t('dlg_prep_methods')));
    const addRow=h('div',{style:{display:'flex',gap:'8px',marginBottom:'12px'}});
    const newInput=h('input',{type:'text',placeholder:t('ph_new_method'),style:{flex:1}});
    addRow.append(newInput,h('button',{class:'btn btn-accent btn-sm',onClick:async()=>{
      const v=newInput.value.trim();if(!v) return;
      try{await createPreparationMethod(v);}catch(e){alert(t('msg_method_exists'));}
      newInput.value='';refresh();
    }},'+'));
    content.appendChild(addRow);
    const listDiv2=h('div',{});content.appendChild(listDiv2);
    content.appendChild(h('div',{style:{marginTop:'16px',textAlign:'center'}},h('button',{class:'btn btn-surface',onClick:()=>closeModal(modal)},t('btn_close'))));
    const modal=showModal(content);
    async function refresh(){
      listDiv2.innerHTML='';
      (await getPreparationMethods()).forEach(m=>{
        const row=h('div',{class:'subcat-row'});
        const nameEl=h('span',{style:{fontSize:'13px'}},prepMethodDisplayName(m));
        if(m.name_en) nameEl.appendChild(h('span',{style:{color:'var(--text-muted)',fontSize:'11px',marginLeft:'6px'}},'('+m.name_en+')'));
        row.appendChild(nameEl);
        const btns=h('span',{style:{display:'flex',gap:'4px'}});
        btns.appendChild(h('button',{class:'btn-icon btn-ghost',onClick:()=>{
          const nameIn=h('input',{type:'text',value:m.name,style:{width:'100%'}});
          const nameEnIn=h('input',{type:'text',placeholder:t('ph_name_en'),value:m.name_en||'',style:{width:'100%'}});
          const sub=showModal(h('div',{},
            h('h2',{},t('btn_edit')),
            h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_name')),nameIn),
            h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_name_en')),nameEnIn),
            h('div',{class:'modal-buttons'},
              h('button',{class:'btn btn-accent',onClick:async()=>{
                const n=nameIn.value.trim();if(!n) return;
                await updatePreparationMethod(m.id,n,nameEnIn.value.trim());closeModal(sub);refresh();
              }},t('btn_save')),
              h('button',{class:'btn btn-surface',onClick:()=>closeModal(sub)},t('btn_cancel'))
            )
          ));
        }},'✎'));
        btns.appendChild(h('button',{class:'btn-icon btn-danger',onClick:async()=>{if(confirm(t('msg_confirm_delete_method',m.name))){await deletePreparationMethod(m.id);refresh();}}},'✕'));
        row.appendChild(btns);
        listDiv2.appendChild(row);
      });
    }
    refresh();
  }

  renderList();renderDetail();
}

async function renderSpecialOrderPage(container){

  const header=h('div',{class:'page-header'},h('h1',{},t('page_special_order')),
    h('div',{style:{display:'flex',gap:'8px'}},
      h('button',{class:'btn btn-surface',onClick:async()=>{

  const body=h('div',{class:'page-body'});
  container.append(header,body);

  async function printRecipes(){
    if(!selectedActionId){alert(t('msg_no_action_selected'));return;}

    if(!dayIds.length){alert(t('msg_no_days_selected'));return;}
    const assignments=await getAssignments(dayIds);
    if(!assignments.length){alert(t('msg_no_recipes_assigned'));return;}
    const action=await dbGet('actions',selectedActionId);
    const actionName=action?action.name:'';
    const actionDesc=action?action.description||'':'';
    const allRecipes=await getRecipes();
    const slots=await getAllMealSlotsForDays(dayIds);
    // Build EN lookup maps for PDF
    const pdfPrepEnMap={};
    const pdfMealTypeEnMap={};
    if(LANG==='en'){
      (await getPreparationMethods()).forEach(m=>{if(m.name_en) pdfPrepEnMap[m.name]=m.name_en;});
      (await getMealTypeCategories()).forEach(c=>{if(c.name_en) pdfMealTypeEnMap[c.name]=c.name_en;});
    }

    // === PAGE 1: Overview ===
    let overviewRows='';
    let lastDate='';
    for(const slot of slots){
      const dateStr=slot.date?formatDate(slot.date):'';
      const slotAssigns=assignments.filter(a=>a.meal_slot_id===slot.id);
      const recipeNames=slotAssigns.map(a=>{
        const r=allRecipes.find(x=>x.id===a.recipe_id);
        const label=a.is_allergy?t('order_allergy_label'):a.is_side?t('order_side_label'):t('order_recipe_label');
        const port=a.portion_override||a.portion_count;
        return r?`${r.name} <span style="color:#888;font-size:10px">(${label}, ${port} Port.)</span>`:'—';
      }).join('<br>');
      const showDate=dateStr!==lastDate;
      lastDate=dateStr;
      overviewRows+=`<tr>
        <td style="font-weight:${showDate?'700':'400'};border-top:${showDate?'2px solid #ccc':'1px solid #ddd'}">${showDate?dateStr:''}</td>
        <td style="border-top:${showDate?'2px solid #ccc':'1px solid #ddd'}">${pdfMealTypeEnMap[slot.meal_type]||slot.meal_type}</td>
        <td style="text-align:center;font-weight:700;border-top:${showDate?'2px solid #ccc':'1px solid #ddd'}">${slot.portion_count}</td>
        <td style="border-top:${showDate?'2px solid #ccc':'1px solid #ddd'}">${recipeNames||`<span style="color:#aaa">${t('order_not_assigned')}</span>`}</td>

    }
    const totalPortions=slots.reduce((s,sl)=>s+sl.portion_count,0);
    const totalRecipes=assignments.length;
    const overviewPage=`<div class="recipe-page">
      <div class="page-top">
        <div class="recipe-title">${actionName||(LANG==='en'?'Cooking Event':'Kochaktion')}</div>
        <div class="meta-row">${actionDesc?`<span>${actionDesc}</span>`:''}<span>${t('pdf_days_count',dayIds.length,dayIds.length!==1?'e':'')}</span><span>${t('pdf_recipe_assignments',totalRecipes)}</span><span class="portions-badge">${t('pdf_total_portions',totalPortions)}</span></div>
      </div>
      <div style="font-weight:700;font-size:14px;margin:12px 0 8px">${t('pdf_overview_title')}</div>
      <table>
        <thead><tr><th>${t('col_day')}</th><th>${t('col_meal')}</th><th style="text-align:center">${t('col_portions')}</th><th>${t('col_assigned_recipes')}</th></tr></thead>
        <tbody>${overviewRows}</tbody>
      </table>
    </div>`;

    // === RECIPE PAGES ===
    let pages=overviewPage;
    for(const a of assignments){
      const recipe=allRecipes.find(r=>r.id===a.recipe_id);
      if(!recipe) continue;
      const portions=a.portion_override||a.portion_count;
      const dateStr=a.date?formatDate(a.date):'';
      const typeLabel=a.is_allergy?t('order_allergy_label'):a.is_side?t('order_side_label'):t('order_recipe_label');
      const reqIngs=recipe.ingredients.filter(i=>!i.optional);
      const optIngs=recipe.ingredients.filter(i=>i.optional);
      const hasAb=recipe.ingredients.some(i=>(i.ingredient_abschnitt||0)>0);
      const hasKf=recipe.ingredients.some(i=>(i.ingredient_kochfaktor||1)!==1);
      const colSpan=4+(hasAb?1:0)+(hasKf?1:0);
      function ingTr(ing,style=''){
        const total=Math.round((ing.quantity_per_person||0)*portions*100)/100;
        const totalStr=String(total).replace('.',',');
        const perPStr=String(ing.quantity_per_person||0).replace('.',',');
        const ab=ing.ingredient_abschnitt||0;
        const netto=total*(1-ab/100);
        let nettoTd='';
        if(hasAb){const nettoR=Math.round(netto*100)/100;const nettoStr=String(nettoR).replace('.',',');nettoTd=ab>0?`<td style="text-align:right;color:#2d6a4f">${nettoStr} ${ing.unit}</td>`:`<td style="text-align:right;color:#aaa">—</td>`;}
        let kfTd='';
        if(hasKf){const kf=ing.ingredient_kochfaktor||1;const cooked=Math.round(netto*kf*100)/100;const cookedStr=String(cooked).replace('.',',');kfTd=kf!==1?`<td style="text-align:right;color:#40916c">${cookedStr} ${ing.unit}</td>`:`<td style="text-align:right;color:#aaa">—</td>`;}
        const pdfIngName=LANG==='en'?(ing.ingredient_name_en||ing.ingredient_name):ing.ingredient_name;
        const pdfPrep=ing.preparation?(LANG==='en'?(pdfPrepEnMap[ing.preparation]||ing.preparation):ing.preparation):'—';
        return `<tr${style}><td>${pdfIngName}</td><td>${pdfPrep}</td><td style="text-align:right">${perPStr} ${ing.unit}</td><td style="text-align:right;font-weight:700">${totalStr} ${ing.unit}</td>${nettoTd}${kfTd}</tr>`;
      }
      const aSubs=a.substitutions||{};
      function ingTrWithSub(ing,style=''){
        const subChoice=aSubs[String(ing.id)];
        if(subChoice&&subChoice.ingredient_name){
          const subIngObj={...ing,ingredient_name:subChoice.ingredient_name,ingredient_name_en:subChoice.ingredient_name_en||'',quantity_per_person:subChoice.quantity_per_person,unit:subChoice.unit||ing.unit,preparation:subChoice.preparation||ing.preparation};
          let row=ingTr(subIngObj,style);
          const origName=LANG==='en'?(ing.ingredient_name_en||ing.ingredient_name):ing.ingredient_name;
          row+=`<tr${style}><td colspan="${colSpan}" style="font-size:9px;color:#888;padding:2px 10px;font-style:italic">⇄ ${t('pdf_instead_of')} ${origName}</td></tr>`;
          return row;
        }
        return ingTr(ing,style);
      }
      let ingRows='';
      for(const ing of reqIngs) ingRows+=ingTrWithSub(ing);
      if(optIngs.length){
        ingRows+=`<tr><td colspan="${colSpan}" style="background:#f5f5f5;font-style:italic;font-size:10px;color:#888;padding:4px 10px">${t('pdf_optional_ings')}</td></tr>`;
        for(const ing of optIngs) ingRows+=ingTrWithSub(ing,' style="opacity:0.7;font-style:italic"');
      }
      let totalCost=0;
      for(const ing of recipe.ingredients){totalCost+=(ing.ingredient_price||0)*(ing.quantity_per_person||0)*portions;}
      const costStr=totalCost.toFixed(2).replace('.',',')+' €';
      const costPerP=(totalCost/portions).toFixed(2).replace('.',',')+' €';

      pages+=`<div class="recipe-page">
        <div class="page-top">
          <div class="recipe-title">${(LANG==='en'&&recipe.name_en)?recipe.name_en:recipe.name}</div>
          <div class="meta-row">${actionName?`<span>${t('pdf_cooking_action',actionName)}</span>`:''}${dateStr?`<span>${dateStr}</span>`:''}<span>${pdfMealTypeEnMap[a.meal_type]||a.meal_type} — ${typeLabel}</span><span class="portions-badge">${portions} ${t('cal_portionen_unit')}</span></div>
        </div>
        <div class="fill-fields">
          <div class="fill-line"><strong>${t('pdf_cooking_team')}</strong> <span class="line-blank"></span></div>
          <div class="fill-line"><strong>${t('pdf_schedule')}</strong> <span class="line-blank-short"></span> <strong>${t('pdf_ready_by')}</strong> <span class="line-blank-short"></span></div>
        </div>
        ${recipe.description?`<div class="desc-block"><strong>${t('pdf_description')}</strong> ${recipe.description}</div>`:''}
        <div class="info-grid">
          ${recipe.zubereitung_zeit?`<div class="info-item"><span class="info-label">${t('pdf_prep_time_label')}</span><span>${recipe.zubereitung_zeit}</span></div>`:''}
          ${recipe.garzeit?`<div class="info-item"><span class="info-label">${t('pdf_cook_time_label')}</span><span>${recipe.garzeit}</span></div>`:''}
          <div class="info-item"><span class="info-label">${t('pdf_total_cost')}</span><span>${costStr}</span></div>
          <div class="info-item"><span class="info-label">${t('pdf_cost_per_portion')}</span><span>${costPerP}</span></div>
        </div>
        <table>
          <thead><tr><th>${t('col_ingredient')}</th><th>${t('col_processing')}</th><th>${t('col_qty_per_person')}</th><th>${t('col_total_qty')}</th>${hasAb?`<th>${t('col_netto')}</th>`:''}${hasKf?`<th>${t('col_cooked')}</th>`:''}</tr></thead>
          <tbody>${ingRows}</tbody>
        </table>
        ${recipe.allergens.length||recipe.allergen_hinweis?`<div class="section"><div class="section-title">${t('pdf_allergens_section')}</div><div class="section-body">${recipe.allergens.map(a=>`<span style="display:inline-block;background:#fce4e4;color:#c0392b;padding:2px 10px;border-radius:10px;font-size:11px;margin:2px 4px 2px 0">${allergenDisplayName(a)}</span>`).join('')}${recipe.allergen_hinweis?`<div style="margin-top:4px;font-style:italic;font-size:11px;color:#666">${recipe.allergen_hinweis}</div>`:''}</div></div>`:''}
        ${recipe.zubereitung?`<div class="section"><div class="section-title">${t('pdf_preparation_section')}</div><div class="section-body">${recipe.zubereitung.replace(/\n/g,'<br>')}</div></div>`:''}
        ${recipe.hinweis?`<div class="section"><div class="section-title">${t('pdf_note_section')}</div><div class="section-body">${recipe.hinweis.replace(/\n/g,'<br>')}</div></div>`:''}
        <div class="notes-box">
          <div class="notes-title">${t('pdf_notes_box')}</div>
          <div class="notes-lines"><div class="note-line"></div><div class="note-line"></div><div class="note-line"></div><div class="note-line"></div><div class="note-line"></div></div>
        </div>
      </div>`;
    }
    const printHTML=`<!DOCTYPE html><html lang="${LANG}"><head><meta charset="UTF-8"><title>${LANG==='en'?'Recipes':'Rezepte'} — ${actionName}</title>
<style>
@page{size:A4;margin:0}

    const win=window.open('','_blank');
    win.document.write(printHTML);
    win.document.close();
    win.onload=()=>win.print();
  }

  // Day order groups
  const dayFilterCard=h('div',{class:'card',style:{marginBottom:'12px'}});
  const dayFilterHeader=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}});
  dayFilterHeader.appendChild(h('span',{style:{fontWeight:'700',fontSize:'13px'}},t('order_split_label')));
  const hintSpan=h('span',{style:{fontSize:'11px',color:'var(--text-muted)'}},t('order_split_hint'));
  dayFilterHeader.appendChild(hintSpan);
  dayFilterCard.appendChild(dayFilterHeader);
  const dayFilterBody=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px'}});
  dayFilterCard.appendChild(dayFilterBody);
  body.appendChild(dayFilterCard);
  const dayEntries=[];

  async function populateDayFilter(){
    dayFilterBody.innerHTML='';
    dayEntries.length=0;
    if(!selectedActionId) return;
    const days=await getCookingDays(selectedActionId);
    if(!days.length){dayFilterBody.appendChild(h('span',{style:{fontSize:'12px',color:'var(--text-muted)'}},t('empty_no_cooking_days_filter')));return;}
    const groupColors=['var(--accent)','var(--green)','#d4a017','#7b2d8b','#2980b9','#c0392b','#16a085','#8e44ad'];
    days.forEach(d=>{
      const entry={dayId:d.id,date:d.date,group:1};
      const numEl=h('span',{style:{display:'inline-flex',alignItems:'center',justifyContent:'center',width:'22px',height:'22px',borderRadius:'50%',background:groupColors[0],color:'#fff',fontWeight:'700',fontSize:'12px',flexShrink:0}},'1');
      function updateDisplay(){
        const col=groupColors[(entry.group-1)%groupColors.length];
        numEl.textContent=String(entry.group);
        numEl.style.background=col;
      }
      const box=h('div',{style:{display:'flex',alignItems:'center',gap:'6px',background:'var(--surface2)',padding:'4px 10px',borderRadius:'8px',fontSize:'12px',cursor:'pointer',userSelect:'none'}});
      box.addEventListener('click',()=>{entry.group++;updateDisplay();});
      box.addEventListener('contextmenu',e=>{e.preventDefault();if(entry.group>1){entry.group--;updateDisplay();}});
      box.append(numEl,h('span',{},formatDate(d.date)));
      dayFilterBody.appendChild(box);
      entry.el=numEl;
      dayEntries.push(entry);
    });
  }
  await populateDayFilter();

  function getOrderGroups(){
    const groups={};
    dayEntries.forEach(e=>{
      if(!groups[e.group]) groups[e.group]={dayIds:[],dates:[]};
      groups[e.group].dayIds.push(e.dayId);
      groups[e.group].dates.push(formatDate(e.date));

  const cols=h('div',{class:'two-col'});

  async function renderAssignments(){

    const mealTypeEnMap={};if(LANG==='en'){(await getMealTypeCategories()).forEach(c=>{if(c.name_en) mealTypeEnMap[c.name]=c.name_en;});}

    const byDate={};slots.forEach(s=>(byDate[s.date]=byDate[s.date]||[]).push(s));

                const ok=sum===slot.portion_count;
                hint.style.color=ok?'var(--green-light)':'var(--accent)';
                hint.textContent=t('order_portions_sum',sum,slot.portion_count)+(ok?'  ✓':' ⚠');

                nameSpan.appendChild(h('span',{style:{marginLeft:'6px',fontSize:'10px',padding:'1px 6px',borderRadius:'8px',background:'var(--accent-dim)',color:'var(--accent)',cursor:'help'},title:t('misc_substitutions_active',subCount)},t('misc_subs_count',subCount)));
              }

              const portInput=h('input',{type:'number',value:a.portion_override||a.portion_count,style:{width:'60px',textAlign:'center',fontSize:'12px'},title:'Portionen'});
              portInput.addEventListener('input',updateHint);
              portInput.addEventListener('change',async()=>{
                const v=parseInt(portInput.value);if(v>0) await updateAssignmentPortions(a.id,v);
              });
              portInputs.push(portInput);
              aRow.appendChild(portInput);
              aRow.appendChild(h('span',{style:{fontSize:'11px',color:'var(--text-muted)'}},t('order_portions_port')));
              aRow.appendChild(h('button',{class:'btn-icon btn-danger',style:{width:'24px',height:'24px',fontSize:'10px'},onClick:async()=>{await removeAssignment(a.id);renderAssignments();}},'✕'));
              slotDiv.appendChild(aRow);
            });
            if(groupAssigns.length>1||(isAllergyGroup&&groupAssigns.length>=1)){
              updateHint();
              slotDiv.appendChild(hint);
            }
          }
        }

        renderGroup(recipeAssigns,t('order_group_recipes'));
        renderGroup(sideAssigns,t('order_group_sides'));
        renderGroup(allergyAssigns,t('order_group_allergy'),true);

        const btnRow=h('div',{style:{display:'flex',gap:'4px',marginTop:'4px',flexWrap:'wrap'}});

        btnRow.appendChild(h('button',{class:'btn btn-ghost btn-sm',style:{flex:1},onClick:()=>assignDialog(slot.id,'Beilage',true)},t('btn_assign_side')));

    });

const ALL_STORES=['actions','cooking_days','meal_slots','ingredients','subcategories','standard_meals','meal_components','categories','recipes','recipe_categories','recipe_ingredients','assignments','preparation_methods','meal_type_categories','allergens','ingredient_allergens','recipe_allergens','tags','recipe_tags','ingredient_tags','recipe_ingredient_substitutes'];
// Stores, die zu konkreten Kochaktionen / Planungen gehören und beim Laden des Standard-Datenbestands bewahrt werden sollen
const ACTION_STORES=['actions','cooking_days','meal_slots','assignments'];

async function exportFullDatabase(){
  const data={_meta:{version:DB_VERSION,exported_at:new Date().toISOString(),app:'KF Portionsrechner'}};
  for(const store of ALL_STORES){
    try{data[store]=await dbGetAll(store);}catch(e){data[store]=[];}
  }
  return JSON.stringify(data,null,2);
}

// ── Teilbarer Aktions-Export ──────────────────────────────────
// Exportiert eine oder alle Aktionen inkl. aller abhängigen Daten (Tage, Slots, Zuweisungen).
// Nur zum Teilen mit anderen Menschen im Team gedacht, nicht als Vollbackup.
async function exportActions(actionIds=null){
  const allActions=await dbGetAll('actions');
  const targetActions=actionIds?allActions.filter(a=>actionIds.includes(a.id)):allActions;
  const targetActionIdSet=new Set(targetActions.map(a=>a.id));
  const allDays=await dbGetAll('cooking_days');
  const targetDays=allDays.filter(d=>targetActionIdSet.has(d.action_id));
  const targetDayIdSet=new Set(targetDays.map(d=>d.id));
  const allSlots=await dbGetAll('meal_slots');
  const targetSlots=allSlots.filter(s=>targetDayIdSet.has(s.cooking_day_id));
  const targetSlotIdSet=new Set(targetSlots.map(s=>s.id));
  const allAssignments=await dbGetAll('assignments');
  const targetAssignments=allAssignments.filter(a=>targetSlotIdSet.has(a.meal_slot_id));
  // Rezeptnamen mitspeichern, damit Empfänger fehlende Rezepte erkennen kann
  const recipeIds=[...new Set(targetAssignments.map(a=>a.recipe_id).filter(Boolean))];
  const recipeNames={};
  for(const rid of recipeIds){const r=await dbGet('recipes',rid);if(r) recipeNames[rid]=r.name;}
  return JSON.stringify({
    _meta:{version:DB_VERSION,exported_at:new Date().toISOString(),app:'KF Portionsrechner',type:'actions',action_count:targetActions.length},
    _recipe_names:recipeNames,
    actions:targetActions,
    cooking_days:targetDays,
    meal_slots:targetSlots,
    assignments:targetAssignments
  },null,2);
}

// Importiert Aktionen additiv: bestehende Aktionen bleiben, importierte bekommen neue IDs.
// Remapping: alte ID → neue ID für actions, cooking_days, meal_slots; Assignments bekommen die neuen slot_ids.
// recipe_id bleibt unverändert → wenn das Rezept nicht existiert, warnen wir.
async function importActions(json){
  const data=JSON.parse(json);
  if(!data._meta||data._meta.type!=='actions') throw new Error('Keine gültige Aktions-Datei (erwartet: type="actions")');
  const actionMap={},dayMap={},slotMap={};
  for(const action of (data.actions||[])){
    const oldId=action.id;const {id,...rest}=action;
    const newId=await dbAdd('actions',rest);
    actionMap[oldId]=newId;
  }
  for(const day of (data.cooking_days||[])){
    const oldId=day.id;const {id,...rest}=day;
    rest.action_id=actionMap[rest.action_id];
    if(!rest.action_id) continue;
    const newId=await dbAdd('cooking_days',rest);
    dayMap[oldId]=newId;
  }
  for(const slot of (data.meal_slots||[])){
    const oldId=slot.id;const {id,...rest}=slot;
    rest.cooking_day_id=dayMap[rest.cooking_day_id];
    if(!rest.cooking_day_id) continue;
    const newId=await dbAdd('meal_slots',rest);
    slotMap[oldId]=newId;
  }
  const myRecipes=await dbGetAll('recipes');
  const myRecipeIds=new Set(myRecipes.map(r=>r.id));
  const missingRecipes=new Set();
  let importedAssignments=0,skippedAssignments=0;
  for(const asn of (data.assignments||[])){
    const {id,...rest}=asn;
    rest.meal_slot_id=slotMap[rest.meal_slot_id];
    if(!rest.meal_slot_id){skippedAssignments++;continue;}
    if(rest.recipe_id&&!myRecipeIds.has(rest.recipe_id)){
      const name=(data._recipe_names||{})[rest.recipe_id]||`Rezept-ID ${rest.recipe_id}`;
      missingRecipes.add(name);
    }
    await dbAdd('assignments',rest);
    importedAssignments++;
  }
  return{
    actions:Object.keys(actionMap).length,
    days:Object.keys(dayMap).length,
    slots:Object.keys(slotMap).length,
    assignments:importedAssignments,
    assignmentsSkipped:skippedAssignments,
    missingRecipes:[...missingRecipes]
  };
}

// stores=null → alle Stores überschreiben (klassischer Import)
// stores=Array → nur angegebene Stores überschreiben, Rest bleibt unberührt
async function importFullDatabase(json,stores=null){
  const data=JSON.parse(json);
  if(!data._meta) throw new Error('Ungültige Datei — kein gültiges KF-Backup');
  const targetStores=stores||ALL_STORES;
  for(const store of targetStores){
    if(!data[store]) continue;
    // Clear store
    await new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const s=tx.objectStore(store);const r=s.clear();r.onsuccess=()=>res();r.onerror=e=>rej(e);});
    // Re-insert all records
    for(const record of data[store]){
      await new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const s=tx.objectStore(store);const r=s.put(record);r.onsuccess=()=>res();r.onerror=e=>rej(e);});
    }
  }
}

        if(ing.name_en) continue;
        const en=ingMap.get(ing.name);
        if(en){await updateIngredient(ing.id,ing.name,ing.unit,ing.price||0,ing.subcategory||'',ing.verarbeitungshinweis||'',ing.lagerhinweis||'',ing.abschnitt||0,ing.kochfaktor||1,en);count++;}
      }

      // Subcategories
      const subcatMap=new Map((data.subcategories||[]).map(s=>[s.name,s.name_en||'']));
      for(const s of await getSubcategories()){
        if(s.name_en) continue;
        const en=subcatMap.get(s.name);
        if(en){await updateSubcategory(s.id,s.name,en);count++;}
      }

      // Allergens
      const allergenMap=new Map((data.allergens||[]).map(a=>[a.name,a.name_en||'']));
      for(const a of await getAllergens()){
        if(a.name_en) continue;
        const en=allergenMap.get(a.name);
        if(en){await updateAllergen(a.id,a.name,en);count++;}
      }

      // Preparation methods
      const prepMap=new Map((data.preparation_methods||[]).map(m=>[m.name,m.name_en||'']));
      for(const m of await getPreparationMethods()){
        if(m.name_en) continue;
        const en=prepMap.get(m.name);
        if(en){await updatePreparationMethod(m.id,m.name,en);count++;}
      }

      // Meal type categories
      const mealCatMap=new Map((data.meal_type_categories||[]).map(c=>[c.name,c.name_en||'']));
      for(const c of await getMealTypeCategories()){
        if(c.name_en) continue;
        const en=mealCatMap.get(c.name);
        if(en){await updateMealTypeCategory(c.id,c.name,undefined,en);count++;}
      }

      // Recipes
      const recipeNameEnMap=new Map((data.recipes||[]).map(r=>[r.name,{name_en:r.name_en||'',description_en:r.description_en||''}]));
      for(const r of await getRecipes()){
        if(r.name_en&&r.description_en) continue;
        const tr=recipeNameEnMap.get(r.name);
        if(tr&&(tr.name_en||tr.description_en)){
          const catIds=r.categories.map(c=>c.id);
          const ingsData=r.ingredients.map(i=>({ingredient_id:i.ingredient_id,quantity_per_person:i.quantity_per_person,unit:i.unit,preparation:i.preparation||'',optional:i.optional||false,substitutes:(i.substitutes||[]).map(s=>({ingredient_id:s.ingredient_id,quantity_per_person:s.quantity_per_person,unit:s.unit,preparation:s.preparation||''}))}));
          const extra={name_en:r.name_en||tr.name_en,description_en:r.description_en||tr.description_en,zubereitung_zeit:r.zubereitung_zeit||'',garzeit:r.garzeit||'',zubereitung:r.zubereitung||'',hinweis:r.hinweis||'',allergen_hinweis:r.allergen_hinweis||'',is_allergy_friendly:r.is_allergy_friendly||false,allergenIds:r.manualAllergenIds||[],tagIds:(r.tags||[]).map(tg=>tg.id)};
          await updateRecipe(r.id,r.name,r.description||'',catIds,ingsData,extra);
          count++;
        }
      }

      enNamesStatus.style.color='var(--green-light)';
      enNamesStatus.textContent=t('msg_en_names_imported',count);
    }catch(e){

    }
    alert(t('msg_all_deleted'));
    location.reload();
  }},t('btn_delete_all_data')));
  body.appendChild(dangerCard);
}

    h('span',{style:{display:'inline-block',width:'18px',height:'14px',background:'#2d6a4f',borderRadius:'3px'}}),
    h('span',{},t('season_fresh_label'))));
  legend.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
    h('span',{style:{display:'inline-block',width:'18px',height:'14px',background:'#b08d3b',borderRadius:'3px'}}),
    h('span',{},t('season_storage_label'))));
  legend.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
    h('span',{style:{display:'inline-block',width:'18px',height:'14px',background:'var(--surface3)',borderRadius:'3px',border:'1px solid var(--border)'}}),
    h('span',{},t('season_unavailable'))));
  legend.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
    h('span',{style:{display:'inline-block',width:'18px',height:'14px',background:'transparent',border:'2px solid var(--accent)',borderRadius:'3px'}}),
    h('span',{},t('season_current_month',seasonMonths[currentMonth]))));
  topCard.appendChild(legend);
  body.appendChild(topCard);

  // Table card
  const tableCard=h('div',{class:'card',style:{padding:'0',overflow:'auto'}});
  body.appendChild(tableCard);

  function buildRow(item){
    const row=h('div',{class:'season-row',style:{display:'flex',alignItems:'center',borderBottom:'1px solid var(--border)',minHeight:'32px'}});
    const nameCell=h('div',{style:{width:'170px',minWidth:'170px',padding:'6px 10px',fontSize:'13px',fontWeight:'500',position:'sticky',left:'0',background:'var(--surface)',zIndex:'1',borderRight:'1px solid var(--border)'}},LANG==='en'?(item.name_en||item.name):item.name);
    row.appendChild(nameCell);
    for(let m=0;m<12;m++){
      const state=item.months[m];
      const bg=state===2?'#2d6a4f':state===1?'#b08d3b':'transparent';
      const cell=h('div',{style:{
        flex:'1',minWidth:'36px',height:'28px',margin:'2px',borderRadius:'3px',
        background:bg,
        border:state===0?'1px solid var(--border)':'none',
        boxShadow:m===currentMonth?'0 0 0 2px var(--accent)':'none',
        cursor:'default'
      },title:t('season_tooltip',LANG==='en'?(item.name_en||item.name):item.name,seasonMonths[m],state===2?t('season_fresh'):state===1?t('season_lager'):t('season_unavailable'))});
      row.appendChild(cell);
    }
    return row;
  }

  function renderTable(){
    tableCard.innerHTML='';
    // Header row
    const hdr=h('div',{style:{display:'flex',alignItems:'center',borderBottom:'2px solid var(--border)',position:'sticky',top:'0',background:'var(--surface)',zIndex:'2'}});
    hdr.appendChild(h('div',{style:{width:'170px',minWidth:'170px',padding:'8px 10px',fontSize:'12px',fontWeight:'700',color:'var(--text-muted)',position:'sticky',left:'0',background:'var(--surface)',zIndex:'1',borderRight:'1px solid var(--border)'}},t('col_season_name')));
    seasonMonths.forEach((m,i)=>{
      hdr.appendChild(h('div',{style:{flex:'1',minWidth:'36px',textAlign:'center',padding:'6px 2px',fontSize:'11px',fontWeight:i===currentMonth?'700':'500',color:i===currentMonth?'var(--accent)':'var(--text-muted)'}},m));
    });
    tableCard.appendChild(hdr);

    const q=searchInput.value.toLowerCase().trim();
    const cat=catFilter.value;
    const season=seasonFilter.value;
    let groups={'Gemüse':[],'Obst':[],'Kräuter':[]};
    SEASON_DATA.forEach(item=>{
      if(q&&!item.name.toLowerCase().includes(q)&&!(item.name_en||'').toLowerCase().includes(q)) return;
      if(cat&&item.cat!==cat) return;
      if(season==='current'&&item.months[currentMonth]===0) return;
      if(season==='fresh'&&item.months[currentMonth]!==2) return;
      groups[item.cat].push(item);
    });
    let any=false;
    for(const grp of ['Gemüse','Obst','Kräuter']){
      if(!groups[grp].length) continue;
      any=true;
      const grpHdr=h('div',{style:{padding:'10px 12px 6px',fontSize:'12px',fontWeight:'700',color:'var(--accent)',background:'var(--surface2)',borderBottom:'1px solid var(--border)',textTransform:'uppercase',letterSpacing:'.5px'}},grpLabels[grp]||grp);
      tableCard.appendChild(grpHdr);
      groups[grp].forEach(item=>tableCard.appendChild(buildRow(item)));
    }
    if(!any){
      tableCard.appendChild(h('div',{style:{padding:'20px',textAlign:'center',color:'var(--text-muted)'}},t('empty_no_entries')));
    }
  }

  searchInput.addEventListener('input',renderTable);
  catFilter.addEventListener('change',renderTable);
  seasonFilter.addEventListener('change',renderTable);
  renderTable();

  // Info box
  const infoCard=h('div',{class:'card',style:{marginTop:'16px',fontSize:'12px',color:'var(--text-muted)',lineHeight:'1.5'}});
  infoCard.appendChild(h('div',{style:{fontWeight:'700',marginBottom:'6px',color:'var(--text)'}},t('season_info_title')));
  infoCard.appendChild(h('div',{},t('season_info_body')));
  body.appendChild(infoCard);
}

// ══════════════════════════════════════════════════════════════
//  SERVICE WORKER (Offline-Unterstützung)
// ══════════════════════════════════════════════════════════════
function showUpdateBanner(){
  if(document.getElementById('sw-update-banner')) return;
  const banner=h('div',{id:'sw-update-banner',style:{position:'fixed',left:'50%',transform:'translateX(-50%)',bottom:'20px',background:'var(--accent)',color:'#fff',padding:'10px 16px',borderRadius:'8px',boxShadow:'0 4px 12px rgba(0,0,0,.3)',zIndex:'9999',display:'flex',gap:'12px',alignItems:'center',fontSize:'13px',maxWidth:'90vw'}},
    h('span',{},t('status_update_available')),
    h('button',{class:'btn btn-sm',style:{background:'#fff',color:'var(--accent)',border:'none'},onClick:()=>location.reload()},t('btn_update_reload')),
    h('button',{class:'btn btn-sm',style:{background:'transparent',color:'#fff',border:'1px solid #fff'},onClick:()=>banner.remove()},t('btn_update_later'))
  );
  document.body.appendChild(banner);
}

// Aktive Update-Prüfung: fragt den SW per MessageChannel.
// Liefert {updateAvailable:bool, reason?:string}. reason='no-sw' wenn kein SW aktiv.
function swCheckForUpdate(timeoutMs=8000){
  return new Promise((resolve)=>{
    if(!('serviceWorker' in navigator)) return resolve({updateAvailable:false,reason:'no-sw'});
    navigator.serviceWorker.ready.then((reg)=>{
      const sw=reg.active||navigator.serviceWorker.controller;
      if(!sw) return resolve({updateAvailable:false,reason:'no-sw'});
      // Registrierung zusätzlich aktualisieren lassen (prüft sw.js auf Änderungen)
      try{reg.update();}catch(_){}
      const mc=new MessageChannel();
      const to=setTimeout(()=>resolve({updateAvailable:false,reason:'timeout'}),timeoutMs);
      mc.port1.onmessage=(e)=>{clearTimeout(to);resolve(e.data||{updateAvailable:false});};
      sw.postMessage({type:'CHECK_UPDATE'},[mc.port2]);
    }).catch(()=>resolve({updateAvailable:false,reason:'no-sw'}));
  });
}

if('serviceWorker' in navigator){
  // WICHTIG: Listener synchron registrieren, damit keine Nachrichten
  // verloren gehen, die der SW während des initialen Fetch schon feuert.
  navigator.serviceWorker.addEventListener('message',(e)=>{
    if(e.data&&e.data.type==='SW_UPDATE_AVAILABLE') showUpdateBanner();
  });
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(()=>{
      // Nach dem Start aktiv prüfen, ob eine neue Version vorliegt.
      // Kleine Verzögerung, damit der SW sicher aktiv ist.
      setTimeout(()=>{
        swCheckForUpdate().then(r=>{if(r&&r.updateAvailable) showUpdateBanner();});
      },2000);
    }).catch(err=>console.warn('SW-Registrierung fehlgeschlagen:',err));
  });
}
