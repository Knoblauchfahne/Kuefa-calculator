<style>
/* ── Reset & Base ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#e63946;--accent-hover:#ff4d5a;--accent-dim:#2a1012;
  --green:#2d6a4f;--green-light:#40916c;
  --surface:#1a1a1a;--surface2:#222;--surface3:#2c2c2c;
  --border:#333;--text:#f0f0f0;--text-muted:#888;--bg:#111;
}
:root.light{
  --accent:#e63946;--accent-hover:#d62839;--accent-dim:#fce4e6;
  --green:#2d6a4f;--green-light:#40916c;
  --surface:#ffffff;--surface2:#f5f5f5;--surface3:#eee;
  --border:#ddd;--text:#222;--text-muted:#666;--bg:#f0f0f0;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden}
input,select,textarea,button{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#555}

/* ── Layout ───────────────────────────────────────────────── */
.app{display:flex;height:100vh}
.sidebar{width:240px;min-width:240px;background:var(--surface);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-header{padding:16px 16px 8px;display:flex;align-items:center;gap:8px}
.sidebar-header svg{width:30px;height:36px;flex-shrink:0}
.sidebar-header .title-block{display:flex;flex-direction:column}
.sidebar-header .title{font-size:15px;font-weight:700;color:var(--text)}
.sidebar-header .subtitle{font-size:9px;color:var(--text-muted);letter-spacing:.5px}
.sidebar-sep{height:1px;background:var(--border);margin:8px 12px}
.sidebar-nav{flex:1;padding:0 8px}
.nav-btn{display:block;width:100%;text-align:left;padding:8px 12px;margin:1px 0;border:none;background:transparent;color:var(--text-muted);font-size:13px;border-radius:6px;cursor:pointer;transition:all .15s}
.nav-btn:hover{background:var(--surface2)}
.nav-btn.active{background:var(--accent-dim);color:var(--accent)}
.sidebar-footer{padding:12px;text-align:center;font-size:10px;color:#444}

/* ── Content ──────────────────────────────────────────────── */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.page-header{background:var(--surface);padding:16px 104px 16px 32px;min-height:70px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-header h1{font-size:22px;font-weight:700}
.page-header .subtitle{font-size:12px;color:var(--text-muted)}
.page-body{flex:1;overflow-y:auto;padding:20px 32px}

/* ── Cards & Tables ───────────────────────────────────────── */
.card{background:var(--surface);border-radius:10px;padding:16px;margin-bottom:12px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-title{font-size:14px;font-weight:700}
.badge{font-size:11px;color:var(--accent)}
.table-header{display:flex;background:var(--surface2);border-radius:6px;padding:6px 8px;margin-bottom:4px;font-size:11px;font-weight:700;color:var(--text-muted)}
.table-row{display:flex;align-items:center;padding:4px 8px;border-radius:4px}
.table-row:hover{background:var(--surface2)}

/* ── Buttons ──────────────────────────────────────────────── */
.btn{padding:6px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:var(--accent-hover)}
.btn-surface{background:var(--surface2);color:var(--text)}.btn-surface:hover{background:var(--surface3)}
.btn-ghost{background:transparent;color:var(--text-muted)}.btn-ghost:hover{background:var(--surface2)}
.btn-danger{background:transparent;color:var(--accent)}.btn-danger:hover{background:var(--accent-dim)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:var(--green-light)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-icon{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:4px}

/* ── Forms ────────────────────────────────────────────────── */
input[type=text],input[type=number],select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;outline:none;transition:border .15s;line-height:1.5}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder{color:#555}
select{cursor:pointer}
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:4px}
.form-row{display:flex;gap:8px}
.form-row>*{flex:1}
.search-input{width:300px;max-width:100%}
label.checkbox{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;margin-right:12px}
label.checkbox input{accent-color:var(--accent);width:16px;height:16px}

/* ── Modal ────────────────────────────────────────────────── */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--surface);border-radius:12px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:20px}
.modal-lg{width:650px}
.modal-with-side{display:flex;gap:0;padding:0;width:auto;max-width:95vw}
.modal-with-side .modal-main{flex:1;min-width:0;padding:20px;width:650px;max-height:90vh;overflow-y:auto}
.modal-with-side .modal-side{width:220px;background:var(--surface2);border-left:1px solid var(--border);padding:16px;border-radius:0 12px 12px 0;overflow-y:auto;max-height:90vh}
.modal h2{font-size:18px;font-weight:700;margin-bottom:12px}
.modal-buttons{display:flex;gap:8px;margin-top:16px}
.modal-buttons .btn{flex:1}

/* ── Calendar ─────────────────────────────────────────────── */
.cal-layout{display:flex;gap:16px}
.cal-sidebar{width:220px;flex-shrink:0}
.cal-content{flex:1;min-width:0}
.cal-cols{display:flex;gap:16px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav .month-label{font-size:15px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-header{text-align:center;font-size:11px;color:var(--text-muted);padding:4px}
.cal-day{text-align:center;padding:10px 4px;border-radius:8px;cursor:pointer;font-size:13px;border:none;background:transparent;color:var(--text);transition:all .12s}
.cal-day:hover{background:var(--surface2)}
.cal-day.cooking{background:var(--accent-dim);color:var(--accent);font-weight:700}
.cal-day.selected{background:var(--accent);color:#fff;font-weight:700}
.cal-day.today{border:1px solid var(--accent)}
.cal-day.empty{cursor:default;pointer-events:none}

/* ── Meal Slot Row ────────────────────────────────────────── */
.meal-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:8px;padding:10px 12px;margin:4px 0}
.meal-row .meal-type{font-weight:700;width:160px;font-size:13px}
.meal-row input{width:100px}
.meal-row .unit-label{font-size:12px;color:var(--text-muted)}

/* ── Action Bar ───────────────────────────────────────────── */
.action-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.action-bar select{min-width:260px}

/* ── Two-Col Layout ───────────────────────────────────────── */
.two-col{display:flex;gap:16px;height:100%}
.two-col .col-left{width:300px;min-width:260px;flex-shrink:0;overflow-y:auto}
.two-col .col-right{flex:1;overflow-y:auto}

/* ── Recipe / Meal List Items ─────────────────────────────── */
.list-item{padding:10px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:4px;transition:all .12s}
.list-item:hover{border-color:#555}
.list-item.active{background:var(--accent-dim);border-color:var(--accent)}
.list-item .item-name{font-size:13px;font-weight:700}
.list-item.active .item-name{color:var(--accent)}
.list-item .item-meta{font-size:11px;color:var(--text-muted)}

/* ── Category Chips ───────────────────────────────────────── */
.chip{display:inline-block;padding:2px 10px;background:var(--surface3);border-radius:12px;font-size:11px;color:var(--text-muted);margin-right:4px;margin-bottom:4px}
.tag-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:11px;color:var(--text-muted);margin-right:4px;margin-bottom:4px}
.tag-chip .tag-remove{cursor:pointer;opacity:.6;font-size:10px}.tag-chip .tag-remove:hover{opacity:1;color:var(--accent)}
.tag-input-wrap{position:relative;display:flex;flex-wrap:wrap;align-items:center;gap:4px;padding:4px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;min-height:34px;cursor:text}
.tag-input-wrap input{border:none;background:transparent;color:var(--text);outline:none;font-size:12px;min-width:80px;flex:1;padding:2px 0}
.tag-autocomplete{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:6px;max-height:160px;overflow-y:auto;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.tag-autocomplete-item{padding:6px 12px;font-size:12px;cursor:pointer;color:var(--text)}.tag-autocomplete-item:hover,.tag-autocomplete-item.active{background:var(--surface2)}
.tag-autocomplete-new{color:var(--green-light);font-style:italic}
.tag-filter-wrap{min-height:32px;padding:2px 8px;cursor:pointer;flex-shrink:0}

/* ── Assignment Slot ──────────────────────────────────────── */
.assign-slot{background:var(--surface2);border-radius:8px;padding:10px;margin:4px 0}
.assign-slot .slot-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.assign-slot .slot-header .type{font-weight:700;font-size:13px}
.assign-slot .slot-header .portions{font-size:11px;color:var(--accent)}
.assign-recipe{display:flex;align-items:center;justify-content:space-between;padding:2px 0;font-size:12px;color:var(--text-muted)}

/* ── Summary Cards ────────────────────────────────────────── */
.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.summary-card{background:var(--surface);border-radius:10px;padding:16px;text-align:center}
.summary-card .label{font-size:12px;color:var(--text-muted)}
.summary-card .value{font-size:24px;font-weight:700;margin:4px 0}
.summary-card .count{font-size:11px;color:var(--text-muted)}
.diff-bar{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-radius:10px;padding:14px 20px;margin-bottom:16px}

/* ── Category Group ───────────────────────────────────────── */
.cat-group{background:var(--surface);border-radius:10px;margin-bottom:8px;padding:12px 16px}
.cat-group .cat-name{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px}
.cat-group .cat-meta{font-size:11px;color:var(--text-muted)}

.empty-msg{text-align:center;color:var(--text-muted);padding:40px 0}

/* ── Ingredient search popup list ─────────────────────────── */
.ing-search-list .ing-search-item{display:block;width:100%;text-align:left;padding:8px 12px;background:var(--surface2);border:none;color:var(--text);font-size:13px;border-radius:4px;cursor:pointer;margin:2px 0}
.ing-search-item:hover{background:var(--surface3)}

/* ── Subcategory list row ─────────────────────────────────── */
.subcat-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-radius:6px;padding:6px 10px;margin:2px 0}

/* For inline ing rows in recipe dialog */
.ing-row{display:flex;align-items:center;gap:4px;background:var(--surface2);border-radius:6px;padding:4px 8px;margin:2px 0}
.ing-row .ing-display{min-width:180px;font-size:12px;color:var(--text-muted);cursor:pointer;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.ing-row .ing-display:hover{border-color:var(--text-muted)}
.ing-row .ing-display.has-value{color:var(--text)}

/* ── Hamburger Button (hidden on desktop) ────────────────── */
/* ── Theme Toggle ─────────────────────────────────────────── */
/* Controls bar — groups lang + theme toggles as one fixed block */
.ctrl-bar{position:fixed;top:10px;right:10px;z-index:1100;display:flex;gap:6px;align-items:center}
.theme-toggle,.lang-toggle{width:36px;height:36px;border:none;border-radius:8px;background:var(--surface);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:all .15s;flex-shrink:0}
.theme-toggle{font-size:18px}
.theme-toggle:hover,.lang-toggle:hover{background:var(--surface2)}

.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:1100;width:40px;height:40px;border:none;border-radius:8px;background:var(--surface);color:var(--text);font-size:22px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999}

/* ── Mobile Responsive ───────────────────────────────────── */
@media(max-width:768px){
  .hamburger{display:flex}
  .sidebar{position:fixed;top:0;left:-260px;width:240px;min-width:240px;height:100vh;z-index:1000;transition:left .25s ease}
  .sidebar.open{left:0}
  .sidebar-overlay.open{display:block}
  .content{margin-left:0;width:100vw;max-width:100vw;overflow-x:hidden;overflow-y:auto}
  /* Header: stack title and buttons vertically, right padding clears ctrl-bar */
  .page-header{padding:12px 96px 12px 52px;min-height:auto;flex-wrap:wrap;gap:8px}
  .page-header h1{font-size:16px;width:100%}
  .page-header>div{display:flex;flex-wrap:wrap;gap:6px;width:100%}
  .page-header .btn{font-size:11px;padding:5px 10px}
  /* Body */
  .page-body{padding:10px 10px 80px 10px;overflow-x:hidden}
  /* Two-col: stack vertically */
  .two-col{flex-direction:column;height:auto;gap:8px}
  .two-col .col-left{width:100%!important;min-width:0!important;max-height:none;flex-shrink:0;overflow-y:visible}
  .two-col .col-right{flex:1;overflow-y:visible}
  /* Action bar */
  .action-bar{flex-direction:column;align-items:stretch}
  .action-bar select{min-width:0;width:100%}
  .search-input{width:100%}
  /* Forms */
  .form-row{flex-direction:column}
  .form-group input,.form-group select,.form-group textarea{width:100%}
  /* Meal rows */
  .meal-row{flex-wrap:wrap}
  .meal-row .meal-type{width:100%}
  .meal-row input{flex:1;min-width:60px}
  /* Cards & tables */
  .card{padding:12px}
  .table-header,.table-row{font-size:11px;gap:4px;padding:4px 6px}
  .table-header>*,.table-row>*{overflow:hidden;text-overflow:ellipsis}
  .summary-row{grid-template-columns:1fr}
  .summary-card .value{font-size:18px}
  .diff-bar{flex-direction:column;gap:8px;text-align:center;padding:10px}
  /* Category groups */
  .cat-group{padding:10px 12px}
  .cat-group .cat-name{font-size:12px}
  /* Assignment slots */
  .assign-slot{padding:8px}
  .assign-recipe{flex-wrap:wrap;gap:4px}
  .assign-recipe span{font-size:11px}
  .assign-recipe input[type=number]{width:50px!important;font-size:11px;padding:4px}
  /* List items */
  .list-item{padding:8px 10px}
  /* Recipe detail top: stack title & buttons */
  .recipe-detail-top{flex-direction:column!important;align-items:flex-start!important;gap:8px!important}
  .recipe-detail-btns{flex-wrap:wrap!important;gap:6px!important;width:100%}
  /* Modals */
  .modal{width:95vw;padding:14px;padding-bottom:24px;margin-bottom:env(safe-area-inset-bottom,0)}
  .modal-lg{width:95vw}
  .modal-with-side{flex-direction:column;width:95vw}
  .modal-with-side .modal-main{width:100%}
  .modal-with-side .modal-side{width:100%;border-left:none;border-top:1px solid var(--border);border-radius:0 0 12px 12px}
  .modal h2{font-size:16px}
  .modal-buttons{flex-wrap:wrap;padding-bottom:8px}
  /* Ingredient rows */
  .ing-row{flex-wrap:wrap;gap:4px;padding:6px}
  .ing-row .ing-display{min-width:0;width:100%}
  .ing-row select,.ing-row input{font-size:12px}
  /* Calendar */
  .cal-layout{flex-direction:column;gap:10px}
  .cal-sidebar{width:100%}
  .cal-sidebar .card{padding:0}
  .cal-action-list{max-height:120px!important}
  .cal-cols{flex-direction:column;gap:10px}
  .cal-day{padding:6px 2px;font-size:11px}
  .cal-nav .month-label{font-size:13px}
  /* Buttons: ensure text doesn't overflow */
  .btn{white-space:nowrap}
  .btn-ghost.btn-sm{font-size:11px;padding:4px 6px}
  /* Subcat rows */
  .subcat-row{flex-wrap:wrap;gap:4px}
}
</style>

    ['Sorbit-Unverträglichkeit','Sorbit (E\u202F420) wird häufig als Zuckeraustauschstoff in Diät- und Light-Produkten verwendet, kommt aber auch natürlich in Steinobst (Pflaumen, Kirschen, Äpfel) vor.'],
    ['Gluten / Zöliakie','Gluten ist ein Klebereiweiß in Weizen, Roggen, Gerste und verwandten Getreidesorten. Bei Zöliakie (Autoimmunerkrankung) muss Gluten strikt vermieden werden — bereits kleinste Mengen können die Dünndarmschleimhaut schädigen.'],

  // help page sections
  help_calendar_title: '📅  Kalender',
  help_calendar_text: 'Hier verwaltest du deine Kochaktionen oder Veranstaltungen. Links siehst du eine Sidebar-Liste aller angelegten Kochaktionen — klicke auf eine Aktion, um sie auszuwählen. Innerhalb einer Kochaktion legst du Kochtage fest, indem du auf Tage im Kalender klickst, und definierst pro Tag die Mahlzeiten (z.B. Mittagessen, 200 Portionen). Die Mahlzeitkategorien kannst du frei definieren.',
  help_general_title: '📋  Grundbedarfe',
  help_general_text: 'Zeigt den Grundbedarf an Lebensmittelkategorien basierend auf vorher definierten Standardmahlzeiten. Die Berechnung erfolgt automatisch anhand der definierten Kochtage und Portionszahlen. Oben siehst du eine Portionsübersicht pro Mahlzeitkategorie. Die Standardmahlzeiten erreichst du über den gleichnamigen Button. Dort definierst du, welche Kategorien (z.B. Gemüse, Brot) in welcher Menge pro 100 Portionen benötigt werden. Es können mehrere Variationen von Standardmahlzeiten festgelegt werden, je nach Art der Aktion, welche über die Checkbox aus oder abgewählt werden können.',
  help_special_title: '📄  Einkaufsliste nach Rezept',
  help_special_text: 'Hier weist du den Mahlzeit-Slots konkrete Rezepte, Beilagen und Allergie-Essen zu. Die Einkaufsliste wird dann auf Zutatenebene berechnet. Bei mehreren Rezepten pro Slot werden die Portionen automatisch gleichmäßig aufgeteilt, genau so mit den Beilagen. Du kannst die Aufteilung aber auch manuell anpassen. Eine Summenanzeige warnt dich, wenn die Teilportionen nicht mit der definierten Gesamtzahl übereinstimmen. Allergie-Essen werden separat mit eigenen Portionszahlen verwaltet (Empfehlung: ca. 1% der Gesamtportionen). Über die Bestellgruppen-Leiste oben kannst du Kochtage verschiedenen Bestellungen zuordnen (z.B. Bestellung 1 für Tag 1–4, Bestellung 2 für Tag 5–8). Beim Generieren werden separate Einkaufslisten pro Bestellgruppe erzeugt. Über den Rezepte Drucken Button kann eine PDF-Datei erzeugt werden, welche die Rezepte für jede einzelne Mahlzeit ausgibt. Wenn ein Rezept Zutaten-Substitutionen enthält, erscheint beim Zuweisen ein Dialog, in dem du pro Zutat zwischen Original und Substitut wählen kannst. Die Einkaufsliste und das PDF verwenden dann automatisch die gewählten Substitutionen. Zuweisungen mit aktiven Substitutionen werden mit einem ⇄-Symbol gekennzeichnet.',
  help_recipe_title: '📖  Rezeptbuch',
  help_recipe_text: 'Deine Rezeptsammlung. Jedes Rezept enthält Zutaten (mit Menge pro Person und Verarbeitungsmethode), Zubereitungsschritte, Hinweise und optional Zeitangaben. Beim Erstellen kannst du angeben, für wie viele Portionen deine Mengenangaben gelten — die App rechnet automatisch auf 1 Person herunter. Zutaten können als optional markiert werden; diese erscheinen in der Einkaufsliste mit dem Label „(optional)". Jede Zutat kann ein oder mehrere Substitutionen (Ersatzzutaten) haben — klicke auf den ⇄-Button neben einer Zutat, um Substitutionen zu definieren. Diese werden im Rezeptdetail mit „↳ oder:" angezeigt und beim Export/Import als „→ Substitut:"-Zeilen übertragen. Rezepte können als „Allergieessen" markiert werden, damit sie beim Zuweisen von Allergie-Essen zur Auswahl stehen. Rezepte werden den gleichen Mahlzeitkategorien zugeordnet wie die Standardmahlzeiten (z.B. Frühstück, Mittagessen). Dadurch werden in der Einkaufsliste nur passende Rezepte pro Mahlzeit angeboten. Zusätzlich können Rezepte mit frei definierbaren Tags versehen werden, um sie flexibel zu kategorisieren und zu filtern (z.B. „vegan", „schnell", „Sommer"). Du kannst Rezepte als .txt-Datei importieren und exportieren, duplizieren oder über eine Maske neu erstellen.',
  help_ingredients_title: '📦  Zutaten',
  help_ingredients_text: 'Die Zutatendatenbank. Jede Zutat hat einen Namen, eine Einheit (kg, l, etc.), einen Preis pro Einheit als Referenz, eine Kategorie, einen Abschnitt-Wert (% Verlust beim Schälen/Schneiden), einen Kochfaktor (Gewichtsänderung beim Kochen), Verarbeitungs- und Lagerhinweise, zugeordnete Allergene sowie frei definierbare Tags (z.B. „bio", „regional", „TK"). Tags helfen beim Filtern und bei der Suche nach Zutaten — auch innerhalb der Rezeptbearbeitung. Der Abschnitt-Wert wird bei der Bestellmengenberechnung automatisch aufgeschlagen und im Rezept als Netto-Menge angezeigt. Der Kochfaktor ist ein Multiplikator (1 = unverändert, 2.6 = trockene Kichererbsen werden gekocht 2,6-fach schwerer, 0.15 = Spinat schrumpft beim Garen auf 15%) und wird in Rezept und PDF als Gekocht-Spalte dargestellt – rein informativ, damit der Koch weiß, wie viel am Ende auf dem Teller landet. Die Einheit wird automatisch in die Rezepte übernommen. Zutaten lassen sich als .csv oder .txt exportieren und importieren.',
  help_database_title: '💾  Datenbank',
  help_database_text: 'Backup & Verwaltung. Hier kannst du die gesamte Datenbank als JSON-Datei exportieren (Backup) oder eine zuvor exportierte Datei importieren. Einzelne Tabellen können separat gelöscht werden. Nützlich für Datensicherung, Übertragung auf andere Rechner oder Browser. Achtung: Beim Import werden alle aktuellen Daten überschrieben. Die Datenbank-Übersicht zeigt dir, wie viele Einträge in jeder Tabelle gespeichert sind. Über „Standard-Daten laden" kannst du den mitgelieferten Basis-Datenbestand direkt aus dem Repo holen — dabei werden nur Rezepte, Zutaten und Stammdaten überschrieben, deine Kochaktionen, Kochtage, Mahlzeit-Slots und Rezept-Zuweisungen bleiben erhalten. Über „Kochaktionen teilen" kannst du einzelne Aktionen samt ihrer Rezept-Zuweisungen als JSON an andere Teammitglieder weitergeben — beim Import werden die Aktionen additiv hinzugefügt, nichts wird überschrieben.',
  help_season_title: '🗓  Saisonkalender',
  help_season_text: 'Übersicht, welches Obst, Gemüse und welche Kräuter in welchen Monaten in Deutschland Saison haben. Grün = Frisch/Freiland, Gelb = aus Lager verfügbar, Grau = nicht in Saison. Der aktuelle Monat wird farblich markiert. Mit Suche und Filtern kannst du gezielt nach saisonalen Zutaten für deine Rezeptplanung suchen.',
  help_allergen_title: '⚠  Allergene',
  help_allergen_text: 'Auf dieser Seite findest du eine Übersicht der 14 EU-Hauptallergene, häufige Unverträglichkeiten und praktische Hinweise für die Küche. Im Rezeptbuch kannst du jedem Rezept Allergene zuordnen — automatisch aus den Zutaten oder manuell. Rezepte, die als „Allergieessen" markiert sind, stehen in der Einkaufsliste als Allergie-Alternative zur Verfügung.',
  help_install_title: '📲  Installation & Updates',
  help_install_text: 'Die App läuft als Progressive Web App (PWA): über die GitHub-Pages-URL kannst du sie auf Smartphone, Tablet oder Desktop installieren. Auf Android/Chrome/Edge erscheint dazu ein Installations-Symbol in der Adressleiste. Auf iPhone/iPad öffnest du die Seite in Safari, tippst auf „Teilen" und wählst „Zum Home-Bildschirm". Einmal installiert, funktioniert die App auch komplett offline — der Service Worker cacht die App-Shell, alle Daten liegen ohnehin lokal in der IndexedDB. Bei einer neuen Version prüft die App beim Start automatisch und blendet unten ein Banner „Neue Version verfügbar" ein; mit „Neu laden" aktivierst du die neue Version. Falls das Banner mal nicht erscheint, kannst du auf der Datenbank-Seite unter „🔄 App-Update" manuell suchen. Wichtig: Auf iOS pausiert der Hintergrund-Update-Check manchmal — wenn du Änderungen erwartest, nutze dort den manuellen Button.',
  help_general_hints_title: 'Allgemeine Hinweise',
  help_hint_local_storage: 'Alle Daten werden lokal in deinem Browser gespeichert (IndexedDB). Andere Browser oder Rechner haben keinen Zugriff auf diese Daten.',
  help_hint_backup: 'Erstelle regelmäßig ein Backup über die Datenbank-Seite, insbesondere vor Browser-Updates oder dem Löschen von Browserdaten, da sonst deine Datenbank verloren gehen könnte.',
  help_hint_offline: 'Die App funktioniert vollständig offline. Einmal geladen, ist keine Internetverbindung mehr nötig — außer zum Prüfen auf neue Versionen oder zum Laden des Standard-Datenbestands.',
  help_hint_import_format: 'Rezept-Import unterstützt das .txt-Format mit den Abschnitten === REZEPT ===, --- ZUTATEN ---, --- ZUBEREITUNG --- und --- HINWEIS ---. Optionale Zutaten werden mit „; optional" am Zeilenende markiert. Tags werden im Header als „Tags: tag1, tag2" exportiert und beim Import automatisch erstellt. Zutaten-Substitutionen werden als eingerückte Zeilen „→ Substitut: Name; Menge; Einheit; Verarbeitung" unter der jeweiligen Zutat exportiert und importiert.',

  // allergen info page
  ai_intro: 'When cooking for many people, it is important to keep different needs in mind. Special care is required when handling allergens and intolerances. In addition to legally required labelling, common intolerances should also be considered to ensure safe and well-tolerated food for everyone.',
  ai_sec1_title: '1. Legally required allergens (EU)',
  ai_sec1_desc: 'The following 14 major allergens must be clearly labelled according to EU food law (Regulation No. 1169/2011) when used in dishes:',

  ai_intolerances: [
    ['Lactose intolerance','Lactose is the sugar found in milk. With intolerance, the enzyme lactase needed for digestion is absent, which can lead to bloating, stomach pain and diarrhoea. Affects an estimated 15–20% of the population in northern Europe.'],
    ['Fructose malabsorption','Fructose (fruit sugar) is found in fruit, honey, agave syrup and many processed foods. With malabsorption, the small intestine can only absorb fructose to a limited extent.'],
    ['Sorbitol intolerance','Sorbitol (E\u202F420) is commonly used as a sugar substitute in diet and light products, but also occurs naturally in stone fruits (plums, cherries, apples).'],
    ['Gluten / Coeliac disease','Gluten is a protein found in wheat, rye, barley and related grains. With coeliac disease (an autoimmune condition) gluten must be strictly avoided — even tiny amounts can damage the lining of the small intestine.'],
    ['FODMAPs','FODMAPs (fermentable oligosaccharides, disaccharides, monosaccharides and polyols) are poorly digestible carbohydrates that ferment in the large intestine and can cause bloating, cramps and diarrhoea in sensitive individuals.'],
    ['Histamine intolerance','Histamine is found mainly in aged, fermented or long-stored foods (e.g. cheese, wine, sauerkraut, smoked fish). With intolerance, histamine is not broken down sufficiently in the body.']

  ai_kitchen_tips: [

    ['When in doubt, leave it out','If the composition of an ingredient is not clearly known, do not use it or label it as potentially containing allergens.'],

    ['Team communication','Clear communication about who is responsible for allergy-safe food, and good information sharing when allergen-relevant topics arise.'],

  // help page sections
  help_calendar_title: '📅  Calendar',
  help_calendar_text: 'Manage your cooking events or occasions here. On the left you see a sidebar list of all created cooking events — click one to select it. Within a cooking event, set cooking days by clicking days in the calendar and define meals per day (e.g. Lunch, 200 servings). Meal categories can be freely defined.',
  help_general_title: '📋  Basic Needs',
  help_general_text: 'Shows the basic need for food categories based on predefined standard meals. The calculation happens automatically based on defined cooking days and serving counts. At the top you see a serving overview per meal category. Access standard meals via the button of the same name. There you define which categories (e.g. vegetables, bread) are needed in what quantity per 100 servings. Multiple variations of standard meals can be set up depending on the type of event, which can be toggled via checkbox.',
  help_special_title: '📄  Shopping List by Recipe',
  help_special_text: 'Assign specific recipes, side dishes and allergy meals to meal slots here. The shopping list is then calculated at ingredient level. For multiple recipes per slot, servings are automatically split evenly — same for side dishes. You can also adjust the split manually. A total display warns you when partial servings do not match the defined total. Allergy meals are managed separately with their own serving counts (recommendation: approx. 1% of total servings). Use the order group bar at the top to assign cooking days to different orders (e.g. Order 1 for days 1–4, Order 2 for days 5–8). When generating, separate shopping lists per order group are created. The Print Recipes button generates a PDF with recipes for each individual meal. If a recipe contains ingredient substitutions, a dialog appears on assignment letting you choose between original and substitute per ingredient. The shopping list and PDF then use the chosen substitutions automatically. Assignments with active substitutions are marked with a ⇄ symbol.',
  help_recipe_title: '📖  Recipe Book',
  help_recipe_text: 'Your recipe collection. Each recipe contains ingredients (with quantity per person and processing method), preparation steps, notes and optional time information. When creating, you can specify how many servings your quantities are for — the app automatically divides down to 1 person. Ingredients can be marked as optional; these appear in the shopping list with the label "(optional)". Each ingredient can have one or more substitutions (alternative ingredients) — click the ⇄ button next to an ingredient to define substitutions. They are shown in the recipe detail as "↳ or:" and exported/imported as "→ Substitute:" lines. Recipes can be marked as "Allergy meal" so they appear as an allergy alternative during assignment. Recipes are assigned to the same meal categories as standard meals (e.g. Breakfast, Lunch). This ensures only matching recipes are offered per meal in the shopping list. Recipes can also be tagged with freely definable tags for flexible categorisation and filtering (e.g. "vegan", "quick", "summer"). You can import and export recipes as .txt files, duplicate them or create new ones via a form.',
  help_ingredients_title: '📦  Ingredients',
  help_ingredients_text: 'The ingredient database. Each ingredient has a name, a unit (kg, l, etc.), a reference price per unit, a category, a trim value (% loss during peeling/cutting), a cook factor (weight change during cooking), processing and storage notes, assigned allergens and freely definable tags (e.g. "organic", "regional", "frozen"). Tags help with filtering and searching for ingredients — including within recipe editing. The trim value is automatically added to order quantities and shown in recipes as the net quantity. The cook factor is a multiplier (1 = unchanged, 2.6 = dry chickpeas become 2.6× heavier when cooked, 0.15 = spinach shrinks to 15% when cooked) and is shown in recipes and PDFs as a "Cooked" column — purely informational so the chef knows how much ends up on the plate. The unit is automatically adopted into recipes. Ingredients can be exported and imported as .csv or .txt files.',
  help_database_title: '💾  Database',
  help_database_text: 'Backup & management. Export the entire database as a JSON file (backup) or import a previously exported file. Individual tables can be deleted separately. Useful for data backup, transfer to another computer or browser. Warning: import overwrites all current data. The database overview shows how many entries are stored in each table. Via "Load default data" you can fetch the built-in base dataset directly from the repo — only recipes, ingredients and master data are overwritten, your cooking events, cooking days, meal slots and recipe assignments remain. Via "Share cooking events" you can share individual events including recipe assignments as JSON with team members — on import, events are added additively, nothing is overwritten.',
  help_season_title: '🗓  Seasonal Calendar',
  help_season_text: 'Overview of which fruit, vegetables and herbs are in season in which months in Germany. Green = fresh/field, yellow = available from storage, grey = not in season. The current month is highlighted. Use search and filters to find seasonal ingredients for your recipe planning.',
  help_allergen_title: '⚠  Allergens',

// Übersetzungsfunktion: t('key') oder t('key', arg1, arg2) für Platzhalter {0},{1}
function t(key, ...args) {
  const s = I18N[LANG]?.[key] ?? I18N.de[key] ?? key;
  return args.length ? args.reduce((str, a, i) => str.replace(`{${i}}`, a), s) : s;
}

function toggleLang() {
  LANG = LANG === 'de' ? 'en' : 'de';
  localStorage.setItem('kuefa-lang', LANG);
  document.getElementById('lang-toggle').textContent = LANG.toUpperCase();
  location.reload();
}

function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains('actions')) d.createObjectStore('actions',{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains('cooking_days')){const s=d.createObjectStore('cooking_days',{keyPath:'id',autoIncrement:true});s.createIndex('action_id','action_id');}
      if(!d.objectStoreNames.contains('meal_slots')){const s=d.createObjectStore('meal_slots',{keyPath:'id',autoIncrement:true});s.createIndex('cooking_day_id','cooking_day_id');}
      if(!d.objectStoreNames.contains('ingredients')){const s=d.createObjectStore('ingredients',{keyPath:'id',autoIncrement:true});s.createIndex('name','name',{unique:true});}
      if(!d.objectStoreNames.contains('subcategories')){const s=d.createObjectStore('subcategories',{keyPath:'id',autoIncrement:true});s.createIndex('name','name',{unique:true});}
      if(!d.objectStoreNames.contains('standard_meals')) d.createObjectStore('standard_meals',{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains('meal_components')){const s=d.createObjectStore('meal_components',{keyPath:'id',autoIncrement:true});s.createIndex('meal_id','standard_meal_id');}
      if(!d.objectStoreNames.contains('categories')){const s=d.createObjectStore('categories',{keyPath:'id',autoIncrement:true});s.createIndex('name','name',{unique:true});}
      if(!d.objectStoreNames.contains('recipes')) d.createObjectStore('recipes',{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains('recipe_categories')){const s=d.createObjectStore('recipe_categories',{keyPath:'id',autoIncrement:true});s.createIndex('recipe_id','recipe_id');}
      if(!d.objectStoreNames.contains('recipe_ingredients')){const s=d.createObjectStore('recipe_ingredients',{keyPath:'id',autoIncrement:true});s.createIndex('recipe_id','recipe_id');}
      if(!d.objectStoreNames.contains('assignments')){const s=d.createObjectStore('assignments',{keyPath:'id',autoIncrement:true});s.createIndex('meal_slot_id','meal_slot_id');}
      if(!d.objectStoreNames.contains('preparation_methods')){const s=d.createObjectStore('preparation_methods',{keyPath:'id',autoIncrement:true});s.createIndex('name','name',{unique:true});}
      if(!d.objectStoreNames.contains('meal_type_categories')){const s=d.createObjectStore('meal_type_categories',{keyPath:'id',autoIncrement:true});s.createIndex('name','name',{unique:true});}
      if(!d.objectStoreNames.contains('allergens')){const s=d.createObjectStore('allergens',{keyPath:'id',autoIncrement:true});s.createIndex('name','name',{unique:true});}
      if(!d.objectStoreNames.contains('ingredient_allergens')){const s=d.createObjectStore('ingredient_allergens',{keyPath:'id',autoIncrement:true});s.createIndex('ingredient_id','ingredient_id');}
      if(!d.objectStoreNames.contains('recipe_allergens')){const s=d.createObjectStore('recipe_allergens',{keyPath:'id',autoIncrement:true});s.createIndex('recipe_id','recipe_id');}
      if(!d.objectStoreNames.contains('tags')){const s=d.createObjectStore('tags',{keyPath:'id',autoIncrement:true});s.createIndex('name','name',{unique:true});}
      if(!d.objectStoreNames.contains('recipe_tags')){const s=d.createObjectStore('recipe_tags',{keyPath:'id',autoIncrement:true});s.createIndex('recipe_id','recipe_id');s.createIndex('tag_id','tag_id');}
      if(!d.objectStoreNames.contains('ingredient_tags')){const s=d.createObjectStore('ingredient_tags',{keyPath:'id',autoIncrement:true});s.createIndex('ingredient_id','ingredient_id');s.createIndex('tag_id','tag_id');}
      if(!d.objectStoreNames.contains('recipe_ingredient_substitutes')){const s=d.createObjectStore('recipe_ingredient_substitutes',{keyPath:'id',autoIncrement:true});s.createIndex('recipe_ingredient_id','recipe_ingredient_id');}
    };
    req.onsuccess = e => {db=e.target.result;resolve(db);};
    req.onerror = e => reject(e);
  });
}

// Generic helpers
function txStore(name,mode='readonly'){return db.transaction(name,mode).objectStore(name);}
function dbGetAll(store){return new Promise((r,j)=>{const req=txStore(store).getAll();req.onsuccess=()=>r(req.result);req.onerror=j;});}
function dbGet(store,id){return new Promise((r,j)=>{const req=txStore(store).get(id);req.onsuccess=()=>r(req.result);req.onerror=j;});}
function dbAdd(store,obj){return new Promise((r,j)=>{const req=txStore(store,'readwrite').add(obj);req.onsuccess=()=>r(req.result);req.onerror=j;});}
function dbPut(store,obj){return new Promise((r,j)=>{const req=txStore(store,'readwrite').put(obj);req.onsuccess=()=>r(req.result);req.onerror=j;});}
function dbDel(store,id){return new Promise((r,j)=>{const req=txStore(store,'readwrite').delete(id);req.onsuccess=()=>r();req.onerror=j;});}
function dbGetByIndex(store,indexName,val){return new Promise((r,j)=>{const req=txStore(store).index(indexName).getAll(val);req.onsuccess=()=>r(req.result);req.onerror=j;});}
function dbClear(store){return new Promise((r,j)=>{const req=txStore(store,'readwrite').clear();req.onsuccess=()=>r();req.onerror=j;});}
// Delete by index
async function dbDelByIndex(store,indexName,val){
  const items = await dbGetByIndex(store,indexName,val);
  for(const item of items) await dbDel(store,item.id);
}

async function seedSubcategories(){
  const existing = await dbGetAll('subcategories');
  if(existing.length===0){
    for(const name of DEFAULT_SUBCATS) await dbAdd('subcategories',{name});
  }
}

async function getMealSlots(dayId){
  const cats=await getMealTypeCategories();
  const order={};cats.forEach((c,i)=>order[c.name]=i);
  return (await dbGetByIndex('meal_slots','cooking_day_id',dayId)).sort((a,b)=>(order[a.meal_type]??99)-(order[b.meal_type]??99));

async function getAllMealSlotsForDays(dayIds){
  let all=[];
  for(const did of dayIds){const slots=await getMealSlots(did);const day=await dbGet('cooking_days',did);all.push(...slots.map(s=>({...s,date:day?.date})));}
  const cats=await getMealTypeCategories();
  const order={};cats.forEach((c,i)=>order[c.name]=i);
  return all.sort((a,b)=>a.date.localeCompare(b.date)||(order[a.meal_type]??99)-(order[b.meal_type]??99));

function createTagInput(existingTagIds,onChange){
  let selectedIds=[...existingTagIds];
  const wrap=h('div',{class:'tag-input-wrap'});
  const input=h('input',{type:'text',placeholder:'Tag hinzufügen...'});
  const dropdown=h('div',{class:'tag-autocomplete',style:{display:'none'}});
  wrap.append(dropdown);
  let activeIdx=-1;

  function renderChips(){
    wrap.querySelectorAll('.tag-chip').forEach(c=>c.remove());
    getAllTags().then(allTags=>{
      const before=input;
      selectedIds.forEach(tid=>{
        const tag=allTags.find(t=>t.id===tid);if(!tag) return;
        const chip=h('span',{class:'tag-chip'},tag.name,h('span',{class:'tag-remove',onClick:(e)=>{e.stopPropagation();selectedIds=selectedIds.filter(x=>x!==tid);renderChips();onChange(selectedIds);}},'✕'));
        wrap.insertBefore(chip,before);
      });
    });
  }

  async function showDropdown(){
    const q=input.value.trim().toLowerCase();
    const allTags=await getAllTags();
    const avail=allTags.filter(t=>!selectedIds.includes(t.id));
    const filtered=q?avail.filter(t=>t.name.toLowerCase().includes(q)):avail;
    dropdown.innerHTML='';activeIdx=-1;
    filtered.forEach((t,i)=>{
      const item=h('div',{class:'tag-autocomplete-item',onMousedown:(e)=>{e.preventDefault();selectTag(t.id);}}
      ,t.name);
      dropdown.appendChild(item);
    });
    if(q&&!allTags.find(t=>t.name.toLowerCase()===q)){
      const newItem=h('div',{class:'tag-autocomplete-item tag-autocomplete-new',onMousedown:async(e)=>{
        e.preventDefault();
        try{const id=await createTag(q);selectedIds.push(id);input.value='';renderChips();onChange(selectedIds);dropdown.style.display='none';}catch(ex){
          const existing=await getAllTags();const found=existing.find(t=>t.name.toLowerCase()===q);
          if(found&&!selectedIds.includes(found.id)){selectedIds.push(found.id);input.value='';renderChips();onChange(selectedIds);}
          dropdown.style.display='none';
        }
      }},`+ "${q}" erstellen`);
      dropdown.appendChild(newItem);
    }
    dropdown.style.display=(dropdown.children.length)?'block':'none';
  }

  function selectTag(tid){
    if(!selectedIds.includes(tid)) selectedIds.push(tid);
    input.value='';renderChips();onChange(selectedIds);dropdown.style.display='none';
  }

  input.addEventListener('input',showDropdown);
  input.addEventListener('focus',showDropdown);
  input.addEventListener('blur',()=>{setTimeout(()=>{dropdown.style.display='none';},150);});
  input.addEventListener('keydown',async(e)=>{
    const items=dropdown.querySelectorAll('.tag-autocomplete-item');
    if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,items.length-1);items.forEach((it,i)=>it.classList.toggle('active',i===activeIdx));}
    else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,0);items.forEach((it,i)=>it.classList.toggle('active',i===activeIdx));}
    else if(e.key==='Enter'){
      e.preventDefault();
      if(activeIdx>=0&&items[activeIdx]){items[activeIdx].dispatchEvent(new Event('mousedown'));}
      else if(input.value.trim()){
        const q=input.value.trim().toLowerCase();
        const allTags=await getAllTags();const found=allTags.find(t=>t.name.toLowerCase()===q);
        if(found&&!selectedIds.includes(found.id)){selectTag(found.id);}
        else if(!found){try{const id=await createTag(input.value.trim());selectedIds.push(id);input.value='';renderChips();onChange(selectedIds);dropdown.style.display='none';}catch(ex){}}
      }
    }
    else if(e.key==='Backspace'&&!input.value&&selectedIds.length){selectedIds.pop();renderChips();onChange(selectedIds);}
  });
  wrap.addEventListener('click',()=>input.focus());
  wrap.appendChild(input);
  renderChips();
  return wrap;
}

function createTagFilterInput(onChange){
  let selId=null,selName='';
  const wrap=h('div',{class:'tag-input-wrap tag-filter-wrap'});
  const input=h('input',{type:'text',placeholder:t('filter_all_tags')});
  const dropdown=h('div',{class:'tag-autocomplete',style:{display:'none'}});

  function renderChip(){

    if(selId!==null){
      wrap.insertBefore(h('span',{class:'tag-chip'},selName,
        h('span',{class:'tag-remove',onClick:(e)=>{
          e.stopPropagation();selId=null;selName='';
          input.style.display='';input.placeholder=t('filter_all_tags');
          renderChip();onChange(null);dropdown.style.display='none';
          setTimeout(()=>input.focus(),0);
        }},'✕')),input);
      input.style.display='none';
    }else{input.style.display='';}
  }
  async function showDropdown(){
    const q=input.value.trim().toLowerCase();
    const allTags=await getAllTags();
    const filtered=q?allTags.filter(tg=>tg.name.toLowerCase().includes(q)):allTags;
    dropdown.innerHTML='';activeIdx=-1;
    filtered.forEach(tg=>{
      dropdown.appendChild(h('div',{class:'tag-autocomplete-item',onMousedown:(e)=>{
        e.preventDefault();selId=tg.id;selName=tg.name;input.value='';
        renderChip();onChange(tg.id);dropdown.style.display='none';
      }},tg.name));
    });
    dropdown.style.display=filtered.length?'block':'none';
  }
  input.addEventListener('input',showDropdown);
  input.addEventListener('focus',showDropdown);
  input.addEventListener('blur',()=>setTimeout(()=>{dropdown.style.display='none';},150));
  input.addEventListener('keydown',(e)=>{
    const items=dropdown.querySelectorAll('.tag-autocomplete-item');
    if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,items.length-1);items.forEach((it,i)=>it.classList.toggle('active',i===activeIdx));}
    else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,0);items.forEach((it,i)=>it.classList.toggle('active',i===activeIdx));}
    else if(e.key==='Enter'){e.preventDefault();if(activeIdx>=0&&items[activeIdx])items[activeIdx].dispatchEvent(new Event('mousedown'));}
    else if(e.key==='Escape'){input.blur();dropdown.style.display='none';}
  });
  wrap.addEventListener('click',()=>{if(selId===null)input.focus();});
  wrap.appendChild(input);
  return wrap;
}

async function getRecipes(){
  const recipes=(await dbGetAll('recipes')).sort((a,b)=>a.name.localeCompare(b.name));
  for(const r of recipes){
    const rcs=await dbGetByIndex('recipe_categories','recipe_id',r.id);
    r.categories=[];
    for(const rc of rcs){const c=await dbGet('meal_type_categories',rc.category_id);if(c) r.categories.push(c);}
    const ris=await dbGetByIndex('recipe_ingredients','recipe_id',r.id);
    r.ingredients=[];
    for(const ri of ris){const ing=await dbGet('ingredients',ri.ingredient_id);if(ing){r.ingredients.push({...ri,optional:ri.optional||false,ingredient_name:ing.name,ingredient_name_en:ing.name_en||'',ingredient_unit:ing.unit,ingredient_price:ing.price||0,ingredient_subcategory:ing.subcategory||'',ingredient_abschnitt:ing.abschnitt||0,ingredient_verarbeitungshinweis:ing.verarbeitungshinweis||'',ingredient_lagerhinweis:ing.lagerhinweis||'',ingredient_kochfaktor:(ing.kochfaktor===undefined||ing.kochfaktor===null||ing.kochfaktor==='')?1:Number(ing.kochfaktor)});}}
    // Allergens: auto from ingredients + manually assigned
    const autoAllergenIds=new Set();
    for(const ri of r.ingredients){
      const ias=await dbGetByIndex('ingredient_allergens','ingredient_id',ri.ingredient_id);
      for(const ia of ias) autoAllergenIds.add(ia.allergen_id);
    }
    const manualAllergens=await getRecipeAllergens(r.id);
    const manualIds=manualAllergens.map(a=>a.id);
    const allIds=new Set([...autoAllergenIds,...manualIds]);
    r.allergens=[];r.autoAllergenIds=[...autoAllergenIds];r.manualAllergenIds=manualIds;
    for(const aid of allIds){const a=await dbGet('allergens',aid);if(a) r.allergens.push(a);}
    r.allergens.sort((a,b)=>a.name.localeCompare(b.name));
    r.tags=await getRecipeTags(r.id);
    for(const ri of r.ingredients){ri.substitutes=await getSubstitutes(ri.id);}
  }
  return recipes;
}
async function createRecipe(name,desc,catIds,ingsData,extra={}){
  const id=await dbAdd('recipes',{name,description:desc,name_en:extra.name_en||'',description_en:extra.description_en||'',zubereitung_zeit:extra.zubereitung_zeit||'',garzeit:extra.garzeit||'',zubereitung:extra.zubereitung||'',hinweis:extra.hinweis||'',allergen_hinweis:extra.allergen_hinweis||'',is_allergy_friendly:extra.is_allergy_friendly||false,created_at:new Date().toISOString()});
  for(const cid of catIds) await dbAdd('recipe_categories',{recipe_id:id,category_id:cid});
  for(const i of ingsData){const riId=await dbAdd('recipe_ingredients',{recipe_id:id,ingredient_id:i.ingredient_id,quantity_per_person:i.quantity_per_person,unit:i.unit,preparation:i.preparation||'',optional:i.optional||false});if(i.substitutes&&i.substitutes.length) await setSubstitutes(riId,i.substitutes);}
  if(extra.allergenIds) await setRecipeAllergens(id,extra.allergenIds);
  if(extra.tagIds) await setRecipeTags(id,extra.tagIds);
  return id;
}

  await dbDelByIndex('recipe_ingredients','recipe_id',id);
  for(const cid of catIds) await dbAdd('recipe_categories',{recipe_id:id,category_id:cid});
  for(const i of ingsData){const riId=await dbAdd('recipe_ingredients',{recipe_id:id,ingredient_id:i.ingredient_id,quantity_per_person:i.quantity_per_person,unit:i.unit,preparation:i.preparation||'',optional:i.optional||false});if(i.substitutes&&i.substitutes.length) await setSubstitutes(riId,i.substitutes);}
  if(extra.allergenIds!==undefined) await setRecipeAllergens(id,extra.allergenIds);
  if(extra.tagIds!==undefined) await setRecipeTags(id,extra.tagIds);

async function deleteRecipe(id){

}
function exportRecipeToText(recipe){
  let t="=== REZEPT ===\n";
  t+=`Name: ${recipe.name}\n`;
  t+=`Beschreibung: ${recipe.description||''}\n`;
  t+=`Kategorien: ${recipe.categories.map(c=>c.name).join(', ')}\n`;
  if(recipe.zubereitung_zeit) t+=`Zubereitung: ${recipe.zubereitung_zeit}\n`;
  if(recipe.garzeit) t+=`Garzeit: ${recipe.garzeit}\n`;
  if(recipe.allergens&&recipe.allergens.length) t+=`Allergene: ${recipe.allergens.map(a=>a.name).join(', ')}\n`;
  if(recipe.allergen_hinweis) t+=`Allergen-Hinweis: ${recipe.allergen_hinweis}\n`;
  if(recipe.is_allergy_friendly) t+=`Allergieessen: ja\n`;
  if(recipe.tags&&recipe.tags.length) t+=`Tags: ${recipe.tags.map(t=>t.name).join(', ')}\n`;
  t+="\n--- ZUTATEN (pro Person) ---\n";
  for(const i of recipe.ingredients){
    t+=`${i.ingredient_name}; ${i.preparation||''}; ${i.quantity_per_person}; ${i.unit}${i.optional?'; optional':''}\n`;
    if(i.substitutes&&i.substitutes.length){
      for(const s of i.substitutes) t+=`  → Substitut: ${s.ingredient_name}; ${s.quantity_per_person}; ${s.unit}; ${s.preparation||''}\n`;
    }
  }
  if(recipe.zubereitung){t+="\n--- ZUBEREITUNG ---\n";t+=recipe.zubereitung+"\n";}
  if(recipe.hinweis){t+="\n--- HINWEIS ---\n";t+=recipe.hinweis+"\n";}
  t+="\n=== ENDE ===\n";
  return t;
}
async function importRecipeFromText(content,overwrite=false){
  const blocks=content.split("=== REZEPT ===");
  let added=0,updated=0,skipped=0;
  for(let block of blocks){
    block=block.trim();if(!block) continue;
    block=block.replace(/===\s*ENDE\s*===/g,'').trim();
    const r={name:'',description:'',categories:[],ingredients:[],zubereitung_zeit:'',garzeit:'',zubereitung:'',hinweis:'',allergens:[],allergen_hinweis:'',is_allergy_friendly:false,tags:[]};

    const sections=block.split(/^---\s+/m);
    const headerLines=sections[0].split('\n');
    for(const line of headerLines){
      const l=line.trim();
      if(l.startsWith('Name:')) r.name=l.slice(5).trim();
      else if(l.startsWith('Beschreibung:')) r.description=l.slice(13).trim();
      else if(l.startsWith('Kategorien:')) r.categories=l.slice(11).split(',').map(c=>c.trim()).filter(Boolean);
      else if(l.startsWith('Zubereitung:')) r.zubereitung_zeit=l.slice(12).trim();
      else if(l.startsWith('Garzeit:')) r.garzeit=l.slice(8).trim();
      else if(l.startsWith('Allergene:')) r.allergens=l.slice(10).split(',').map(a=>a.trim()).filter(Boolean);
      else if(l.startsWith('Allergen-Hinweis:')) r.allergen_hinweis=l.slice(17).trim();
      else if(l.startsWith('Allergieessen:')) r.is_allergy_friendly=l.slice(14).trim().toLowerCase()==='ja';
      else if(l.startsWith('Tags:')) r.tags=l.slice(5).split(',').map(t=>t.trim()).filter(Boolean);
    }

    for(let si=1;si<sections.length;si++){
      const sec=sections[si];
      if(sec.startsWith('ZUTATEN')){
        const lines=sec.split('\n').slice(1);
        for(const line of lines){
          const l=line.trim();
          if(l.startsWith('→ Substitut:')&&r.ingredients.length){
            const sp=l.slice(12).split(';').map(x=>x.trim());
            if(sp.length>=3){
              if(!r.ingredients[r.ingredients.length-1].substitutes) r.ingredients[r.ingredients.length-1].substitutes=[];
              r.ingredients[r.ingredients.length-1].substitutes.push({name:sp[0],quantity:parseFloat(sp[1])||0,unit:sp[2],preparation:sp[3]||''});
            }
          } else if(l&&l.includes(';')){const p=l.split(';').map(x=>x.trim());if(p.length>=4)r.ingredients.push({name:p[0],preparation:p[1],quantity:parseFloat(p[2])||0,unit:p[3],optional:p[4]==='optional',substitutes:[]});else if(p.length>=3)r.ingredients.push({name:p[0],preparation:'',quantity:parseFloat(p[1])||0,unit:p[2],optional:false,substitutes:[]});}
        }
      } else if(sec.startsWith('ZUBEREITUNG')){
        r.zubereitung=sec.split('\n').slice(1).join('\n').trim();
      } else if(sec.startsWith('HINWEIS')){
        r.hinweis=sec.split('\n').slice(1).join('\n').trim();
      }
    }

    if(!r.name) continue;

    // Check for existing recipe
    const allRecipes=await getRecipes();
    const existing=allRecipes.find(x=>x.name.toLowerCase()===r.name.toLowerCase());
    if(existing&&!overwrite){skipped++;continue;}

    const ingData=[];
    for(const i of r.ingredients){
      let ings=await getIngredients();let ing=ings.find(x=>x.name===i.name);
      if(!ing){const nid=await createIngredient(i.name,i.unit,0,'');ing={id:nid,name:i.name,unit:i.unit};}
      const subsList=[];
      if(i.substitutes&&i.substitutes.length){
        for(const s of i.substitutes){
          let ings2=await getIngredients();let sIng=ings2.find(x=>x.name===s.name);
          if(!sIng){const sid=await createIngredient(s.name,s.unit,0,'');sIng={id:sid,name:s.name,unit:s.unit};}
          subsList.push({ingredient_id:sIng.id,quantity_per_person:s.quantity,unit:s.unit,preparation:s.preparation||''});
        }
      }
      ingData.push({ingredient_id:ing.id,quantity_per_person:i.quantity,unit:i.unit,preparation:i.preparation||'',optional:i.optional||false,substitutes:subsList});
    }
    const catIds=[];
    for(const cn of r.categories){
      let cats=await getMealTypeCategories();let cat=cats.find(c=>c.name===cn);
      if(!cat){const cid=await createMealTypeCategory(cn);catIds.push(cid);}else catIds.push(cat.id);
    }
    const allergenIds=[];
    for(const an of r.allergens){
      let allAllergens=await getAllergens();let al=allAllergens.find(a=>a.name===an);
      if(!al){const aid=await createAllergen(an);allergenIds.push(aid);}else allergenIds.push(al.id);
    }
    const tagIds=[];
    for(const tn of (r.tags||[])){
      let allTags=await getAllTags();let tag=allTags.find(t=>t.name===tn);
      if(!tag){const tid=await createTag(tn);tagIds.push(tid);}else tagIds.push(tag.id);
    }
    const extra={zubereitung_zeit:r.zubereitung_zeit,garzeit:r.garzeit,zubereitung:r.zubereitung,hinweis:r.hinweis,allergen_hinweis:r.allergen_hinweis,is_allergy_friendly:r.is_allergy_friendly,allergenIds,tagIds};
    if(existing){
      await updateRecipe(existing.id,r.name,r.description,catIds,ingData,extra);
      updated++;
    }else{
      await createRecipe(r.name,r.description,catIds,ingData,extra);
      added++;
    }
  }
  return {added,updated,skipped};
}

async function getAssignments(dayIds){
  let all=[];
  for(const did of dayIds){
    const slots=await getMealSlots(did);
    const day=await dbGet('cooking_days',did);
    for(const s of slots){
      const assigns=await dbGetByIndex('assignments','meal_slot_id',s.id);
      for(const a of assigns){const r=await dbGet('recipes',a.recipe_id);if(r)all.push({...a,recipe_name:r.name,meal_type:s.meal_type,portion_count:s.portion_count,date:day?.date,meal_slot_id:s.id});}
    }
  }
  return all;
}
function assignGroup(a){return a.is_allergy?'allergy':a.is_side?'side':'recipe';}
async function assignRecipe(slotId,recipeId,isSide=false,isAllergy=false,substitutions=null){
  const existing=await dbGetByIndex('assignments','meal_slot_id',slotId);
  const grp=isAllergy?'allergy':isSide?'side':'recipe';
  if(existing.find(a=>a.recipe_id===recipeId&&assignGroup(a)===grp)) return;
  const newId=await dbAdd('assignments',{meal_slot_id:slotId,recipe_id:recipeId,portion_override:0,is_side:isSide,is_allergy:isAllergy,substitutions:substitutions||{}});
  await redistributePortions(slotId,grp);
  return newId;
}
async function removeAssignment(id){
  const a=await dbGet('assignments',id);
  await dbDel('assignments',id);
  if(a) await redistributePortions(a.meal_slot_id,assignGroup(a));
}
async function redistributePortions(slotId,group='recipe'){
  const allAssigns=await dbGetByIndex('assignments','meal_slot_id',slotId);
  const assigns=allAssigns.filter(a=>assignGroup(a)===group);
  if(!assigns.length) return;
  const slot=await dbGet('meal_slots',slotId);
  const total=slot?slot.portion_count:0;
  if(group==='allergy'){
    // Allergy: default 1% of total, min 1, distributed equally
    const allergyTotal=assigns[0].portion_override||Math.max(1,Math.ceil(total*0.01));
    const perRecipe=Math.floor(allergyTotal/assigns.length);
    const remainder=allergyTotal-perRecipe*assigns.length;
    for(let i=0;i<assigns.length;i++){
      assigns[i].portion_override=perRecipe+(i<remainder?1:0);
      await dbPut('assignments',assigns[i]);
    }
  } else {
    const perRecipe=Math.floor(total/assigns.length);
    const remainder=total-perRecipe*assigns.length;
    for(let i=0;i<assigns.length;i++){
      assigns[i].portion_override=perRecipe+(i<remainder?1:0);
      await dbPut('assignments',assigns[i]);
    }
  }
}
async function updateAssignmentPortions(id,portions){
  const a=await dbGet('assignments',id);
  if(a){a.portion_override=portions;await dbPut('assignments',a);}
}

async function generateGeneralOrder(dayIds){
  const items={};
  const subcatEnMap={};
  (await getSubcategories()).forEach(s=>{if(s.name_en) subcatEnMap[s.name]=s.name_en;});
  for(const did of dayIds){
    const slots=await getMealSlots(did);
    for(const slot of slots){
      const meals=await getStandardMeals();
      const meal=meals.find(m=>m.meal_type===slot.meal_type&&m.is_active);
      if(!meal) continue;
      for(const comp of meal.components){
        const subcat=comp.subcategory||t('misc_uncategorized');
        const qty=comp.quantity_per_100*(slot.portion_count/100);
        const ppu=comp.price_per_unit||0;
        const key=`${subcat}_${comp.unit}`;
        if(!items[key]) items[key]={name:subcat,quantity:0,unit:comp.unit,subcategory:subcat,subcategory_en:subcatEnMap[subcat]||'',total_cost:0,price_per_unit:ppu};
        items[key].quantity+=qty;
        items[key].total_cost+=qty*ppu;
      }
    }
  }
  return Object.values(items).sort((a,b)=>a.subcategory.localeCompare(b.subcategory)||a.unit.localeCompare(b.unit));
}

async function generateSpecialOrder(dayIds){
  const items={};
  const subcatEnMap={};
  (await getSubcategories()).forEach(s=>{if(s.name_en) subcatEnMap[s.name]=s.name_en;});
  for(const did of dayIds){
    const slots=await getMealSlots(did);
    for(const slot of slots){
      const assigns=await dbGetByIndex('assignments','meal_slot_id',slot.id);
      for(const a of assigns){
        const portions=a.portion_override||slot.portion_count;
        const ris=await dbGetByIndex('recipe_ingredients','recipe_id',a.recipe_id);
        const subs=a.substitutions||{};
        for(const ri of ris){
          let useIngId=ri.ingredient_id,useQty=ri.quantity_per_person,useUnit=ri.unit;
          const subChoice=subs[String(ri.id)];
          if(subChoice&&subChoice.ingredient_id){useIngId=subChoice.ingredient_id;useQty=subChoice.quantity_per_person;useUnit=subChoice.unit||ri.unit;}
          const ing=await dbGet('ingredients',useIngId);if(!ing) continue;
          const rawQty=useQty*portions;
          const abschnitt=ing.abschnitt||0;
          const qty=rawQty*(1+abschnitt/100);
          const subcat=ing.subcategory||t('misc_uncategorized');
          const isOpt=ri.optional||false;
          const key=`${useIngId}_${useUnit}_${isOpt?'opt':'req'}`;
          if(!items[key]) items[key]={ingredient_id:useIngId,name:ing.name,name_en:ing.name_en||'',quantity:0,unit:useUnit,subcategory:subcat,subcategory_en:subcatEnMap[subcat]||'',price:ing.price||0,abschnitt,optional:isOpt};
          items[key].quantity+=qty;
        }
      }
    }
  }
  return Object.values(items).sort((a,b)=>a.subcategory.localeCompare(b.subcategory)||a.name.localeCompare(b.name));
}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs) for(const[k,v] of Object.entries(attrs)){
    if(k==='class') el.className=v;
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else el.setAttribute(k,v);
  }
  for(const c of children){
    if(typeof c==='string') el.appendChild(document.createTextNode(c));
    else if(c instanceof Node) el.appendChild(c);
    else if(Array.isArray(c)) c.forEach(x=>{if(x instanceof Node) el.appendChild(x);});
  }
  return el;
}

function formatDate(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const days=['So','Mo','Di','Mi','Do','Fr','Sa'];
  return `${days[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}

function showModal(content,cls=''){
  const overlay=h('div',{class:'modal-overlay',onClick:e=>{if(e.target===overlay)overlay.remove();}},
    h('div',{class:`modal ${cls}`},content)
  );
  document.getElementById('modal-root').appendChild(overlay);
  return overlay;
}
function closeModal(overlay){if(overlay) overlay.remove();}

function unitSelect(val='kg'){
  const sel=h('select',{value:val});
  UNITS.forEach(u=>{const o=h('option',{value:u},u);if(u===val)o.selected=true;sel.appendChild(o);});
  return sel;
}

function round2(n){return Math.round(n*100)/100;}

async function renderCalendarPage(container){

  body.appendChild(mainLayout);

  // Action sidebar
  const actionSidebar=h('div',{class:'cal-sidebar'});
  const actionListCard=h('div',{class:'card',style:{padding:'0'}});
  const actionListHeader=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',borderBottom:'1px solid var(--border)'}});
  actionListHeader.appendChild(h('span',{style:{fontWeight:'700',fontSize:'13px'}},t('cal_cooking_actions')));
  actionListHeader.appendChild(h('button',{class:'btn btn-accent btn-sm',style:{padding:'2px 10px',fontSize:'12px'},onClick:()=>newActionDialog()},t('btn_new')));
  actionListCard.appendChild(actionListHeader);
  const actionListBody=h('div',{class:'cal-action-list',style:{maxHeight:'400px',overflowY:'auto'}});
  actionListCard.appendChild(actionListBody);
  actionSidebar.appendChild(actionListCard);
  mainLayout.appendChild(actionSidebar);

  // Populate action list
  const actions=await getActions();
  if(!actions.length){
    selectedActionId=null;
    actionListBody.appendChild(h('div',{class:'empty-msg',style:{padding:'16px',fontSize:'12px'}},t('empty_no_actions')));
  } else {
    if(!selectedActionId||!actions.find(a=>a.id===selectedActionId)) selectedActionId=actions[0].id;
    actions.forEach(a=>{
      const isSel=a.id===selectedActionId;
      const item=h('div',{style:{display:'flex',alignItems:'center',gap:'6px',padding:'8px 12px',cursor:'pointer',background:isSel?'var(--accent)':'transparent',color:isSel?'#fff':'var(--text)',borderBottom:'1px solid var(--border)',transition:'all 0.12s'},onClick:()=>{
        selectedActionId=a.id;calSelectedDate=null;showPage('calendar');
      }});
      item.addEventListener('mouseenter',()=>{if(a.id!==selectedActionId)item.style.background='var(--surface2)';});
      item.addEventListener('mouseleave',()=>{if(a.id!==selectedActionId)item.style.background='transparent';});
      const info=h('div',{style:{flex:1,minWidth:0}});
      info.appendChild(h('div',{style:{fontWeight:'600',fontSize:'13px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},a.name));
      if(a.description) info.appendChild(h('div',{style:{fontSize:'11px',opacity:0.7,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},a.description));
      item.appendChild(info);
      actionListBody.appendChild(item);
    });
  }

  // Action detail buttons (below action list)
  if(selectedActionId){
    const actionBtns=h('div',{style:{display:'flex',gap:'6px',marginTop:'8px'}});
    actionBtns.appendChild(h('button',{class:'btn btn-surface btn-sm',style:{flex:1,fontSize:'12px'},onClick:()=>editActionDialog()},t('btn_edit')));
    actionBtns.appendChild(h('button',{class:'btn btn-danger btn-sm',style:{flex:1,fontSize:'12px'},onClick:()=>deleteActionHandler()},t('btn_delete')));
    actionSidebar.appendChild(actionBtns);
  }

  // Content area (calendar + meals)
  const contentArea=h('div',{class:'cal-content'});
  mainLayout.appendChild(contentArea);

  // Two columns for calendar + meals
  const cols=h('div',{class:'cal-cols'});
  const leftCol=h('div',{style:{flex:'1'}});
  const rightCol=h('div',{style:{flex:'1'}});
  cols.append(leftCol,rightCol);
  contentArea.appendChild(cols);

  // Calendar card
  const calCard=h('div',{class:'card'});
  leftCol.appendChild(calCard);

  // Days list card
  const daysCard=h('div',{class:'card'});
  leftCol.appendChild(daysCard);

  // Meal panel
  const mealPanel=h('div',{});
  rightCol.appendChild(mealPanel);

  async function refreshCal(){
    calCard.innerHTML='';
    daysCard.innerHTML='';
    mealPanel.innerHTML='';

    const cookingDays=selectedActionId? await getCookingDays(selectedActionId):[];
    const cookingDates=new Set(cookingDays.map(d=>d.date));
    const today=new Date().toISOString().slice(0,10);
    const monthNames=[t('month_jan'),t('month_feb'),t('month_mar'),t('month_apr'),t('month_may'),t('month_jun'),t('month_jul'),t('month_aug'),t('month_sep'),t('month_oct'),t('month_nov'),t('month_dec')];

    // Nav
    const nav=h('div',{class:'cal-nav'});
    nav.appendChild(h('button',{class:'btn btn-surface btn-sm',onClick:()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--;}refreshCal();}},'◀'));
    nav.appendChild(h('span',{class:'month-label'},`${monthNames[calMonth]} ${calYear}`));
    nav.appendChild(h('button',{class:'btn btn-surface btn-sm',onClick:()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++;}refreshCal();}},'▶'));
    calCard.appendChild(nav);

    // Day headers
    const grid=h('div',{class:'cal-grid'});
    ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d=>grid.appendChild(h('div',{class:'cal-day-header'},d)));

    // Days
    const firstDay=new Date(calYear,calMonth,1).getDay();
    const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    const offset=(firstDay+6)%7; // Monday start
    for(let i=0;i<offset;i++) grid.appendChild(h('div',{class:'cal-day empty'},''));
    for(let d=1;d<=daysInMonth;d++){
      const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isCooking=cookingDates.has(dateStr);
      const isSelected=dateStr===calSelectedDate;
      const isToday=dateStr===today;
      let cls='cal-day';
      if(isSelected) cls+=' selected';
      else if(isCooking) cls+=' cooking';
      if(isToday&&!isSelected) cls+=' today';
      grid.appendChild(h('button',{class:cls,onClick:async()=>{
        if(!selectedActionId){alert(t('msg_please_select_action'));return;}
        if(!cookingDates.has(dateStr)) await createCookingDay(selectedActionId,dateStr);
        calSelectedDate=dateStr;
        refreshCal();
      }},String(d)));
    }
    calCard.appendChild(grid);

    // Days list
    daysCard.innerHTML='';
    const dHeader=h('div',{class:'card-header'},h('span',{class:'card-title'},t('cal_cooking_days')),h('span',{class:'badge'},t('cal_days_count',cookingDays.length)));
    daysCard.appendChild(dHeader);
    if(!cookingDays.length){
      daysCard.appendChild(h('div',{class:'empty-msg',style:{padding:'12px'}},t('empty_no_cooking_days')));
    } else {
      cookingDays.forEach(cd=>{
        const isSel=cd.date===calSelectedDate;
        const row=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0'}});
        row.appendChild(h('span',{style:{cursor:'pointer',fontWeight:isSel?'700':'400',color:isSel?'var(--accent)':'var(--text)',fontSize:'13px'},onClick:()=>{calSelectedDate=cd.date;refreshCal();}},formatDate(cd.date)));
        row.appendChild(h('button',{class:'btn-icon btn-ghost',onClick:async()=>{await deleteCookingDayByDate(selectedActionId,cd.date);if(calSelectedDate===cd.date)calSelectedDate=null;refreshCal();}},'✕'));
        daysCard.appendChild(row);
      });
    }

    // Meal panel
    mealPanel.innerHTML='';
    if(!calSelectedDate){
      mealPanel.appendChild(h('div',{class:'empty-msg'},t('empty_click_day')));
      return;
    }
    const day=cookingDays.find(d=>d.date===calSelectedDate);
    if(!day) return;

    const mCard=h('div',{class:'card'});
    mCard.appendChild(h('div',{style:{fontWeight:'700',fontSize:'15px',marginBottom:'12px'}},t('cal_meals_header',formatDate(calSelectedDate))));
    const slots=await getMealSlots(day.id);
    const slotMap={};slots.forEach(s=>slotMap[s.meal_type]=s);
    const mealTypeCatsForCal=await getMealTypeCategories();
    const mealTypes=mealTypeCatsForCal.map(c=>c.name);
    const mealTypeEnMap={};if(LANG==='en'){mealTypeCatsForCal.forEach(c=>{if(c.name_en) mealTypeEnMap[c.name]=c.name_en;});}
    if(!mealTypes.length){mCard.appendChild(h('div',{class:'empty-msg'},t('empty_no_meal_cats')));mealPanel.appendChild(mCard);return;}

    mealTypes.forEach(mt=>{
      const slot=slotMap[mt];
      const row=h('div',{class:'meal-row'});
      row.appendChild(h('span',{class:'meal-type'},mealTypeEnMap[mt]||mt));
      const input=h('input',{type:'number',placeholder:'0',value:slot?slot.portion_count:''});
      row.appendChild(input);
      row.appendChild(h('span',{class:'unit-label'},t('cal_portionen_unit')));

      const saveHandler=async()=>{
        const v=parseInt(input.value);
        if(v>0) await createMealSlot(day.id,mt,v);
        refreshCal();
      };
      input.addEventListener('change',saveHandler);

      if(slot){
        row.appendChild(h('button',{class:'btn-icon btn-danger',onClick:async()=>{await deleteMealSlot(slot.id);refreshCal();}},'✕'));
      }
      mCard.appendChild(row);
    });
    mealPanel.appendChild(mCard);
  }

  async function newActionDialog(){
    const nameInput=h('input',{type:'text',placeholder:t('ph_action_name'),style:{width:'100%'}});
    const descInput=h('input',{type:'text',placeholder:t('ph_action_desc'),style:{width:'100%'}});
    const modal=showModal(h('div',{},
      h('h2',{},t('dlg_new_action')),
      h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_name')),nameInput),
      h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_description')),descInput),
      h('div',{class:'modal-buttons'},
        h('button',{class:'btn btn-surface',onClick:()=>closeModal(modal)},t('btn_cancel')),
        h('button',{class:'btn btn-accent',onClick:async()=>{
          if(!nameInput.value.trim()){alert(t('msg_please_name'));return;}
          const id=await createAction(nameInput.value.trim(),descInput.value.trim());
          selectedActionId=id;closeModal(modal);showPage('calendar');
        }},t('btn_create'))
      )
    ));
    nameInput.focus();
  }

  async function editActionDialog(){
    if(!selectedActionId) return;
    const actions=await getActions();
    const action=actions.find(a=>a.id===selectedActionId);if(!action) return;
    const nameInput=h('input',{type:'text',value:action.name,style:{width:'100%'}});
    const descInput=h('input',{type:'text',value:action.description||'',style:{width:'100%'}});
    const modal=showModal(h('div',{},
      h('h2',{},t('dlg_edit_action')),
      h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_name')),nameInput),
      h('div',{class:'form-group'},h('label',{class:'form-label'},t('lbl_description')),descInput),
      h('div',{class:'modal-buttons'},
        h('button',{class:'btn btn-surface',onClick:()=>closeModal(modal)},t('btn_cancel')),
        h('button',{class:'btn btn-accent',onClick:async()=>{
          if(!nameInput.value.trim()) return;
          await updateAction(action.id,nameInput.value.trim(),descInput.value.trim());
          closeModal(modal);showPage('calendar');
        }},t('btn_save'))
      )
    ));
  }

  async function deleteActionHandler(){
    if(!selectedActionId) return;
    const actions=await getActions();
    const action=actions.find(a=>a.id===selectedActionId);
    if(!action||!confirm(t('msg_confirm_delete_action',action.name))) return;
    await deleteAction(action.id);
    selectedActionId=null;calSelectedDate=null;showPage('calendar');
  }

  refreshCal();
}

  async function renderTable(){
    tableContainer.innerHTML='';
    let ings=await getIngredients();
    const subcatEnMap={};
    if(LANG==='en'){(await getSubcategories()).forEach(s=>{if(s.name_en) subcatEnMap[s.name]=s.name_en;});}
    const q=searchInput.value.toLowerCase();
    if(q) ings=ings.filter(i=>i.name.toLowerCase().includes(q)||(i.subcategory||'').toLowerCase().includes(q));
    const cf=catFilter.value;
    if(cf==='__none__') ings=ings.filter(i=>!i.subcategory);
    else if(cf) ings=ings.filter(i=>i.subcategory===cf);
    if(ingTagFilterId) ings=ings.filter(i=>(i.tags||[]).some(tg=>tg.id===ingTagFilterId));

    const hdr=h('div',{class:'table-header'});
    [[t('col_name'),150],[t('col_unit'),55],[t('col_price'),60],[t('col_category'),100],[t('col_trim'),55],[t('col_cook_factor'),70],[t('col_processing_hint'),130],[t('col_storage_hint'),120],[t('col_tags'),150]].forEach(([lbl,w])=>hdr.appendChild(h('span',{style:{width:w+'px',flexShrink:0}},lbl)));
    hdr.appendChild(h('span',{style:{flex:1}}));
    tableContainer.appendChild(hdr);

    if(!ings.length){tableContainer.appendChild(h('div',{class:'empty-msg'},t('empty_no_ingredients')));return;}

    ings.forEach(ing=>{
      const row=h('div',{class:'table-row'});
      row.appendChild(h('span',{style:{width:'150px',flexShrink:0,fontSize:'13px'}},ingDisplayName(ing)));
      row.appendChild(h('span',{style:{width:'55px',flexShrink:0,color:'var(--text-muted)'}},ing.unit));

      const subcatLabel=ing.subcategory?(LANG==='en'?(subcatEnMap[ing.subcategory]||ing.subcategory):ing.subcategory):'—';
      row.appendChild(h('span',{style:{width:'100px',flexShrink:0,color:ing.subcategory?'var(--green-light)':'var(--text-muted)'}},subcatLabel));

      row.appendChild(h('span',{style:{width:'120px',flexShrink:0,color:'var(--text-muted)',fontSize:'12px'}},ing.lagerhinweis||'—'));
      const tagCell=h('span',{style:{width:'150px',flexShrink:0}});

      if(!(ing.tags||[]).length) tagCell.appendChild(h('span',{style:{color:'var(--text-muted)'}},'—'));
      row.appendChild(tagCell);
      const btns=h('span',{style:{marginLeft:'auto',display:'flex',gap:'4px'}});

  async function exportIngredients(){
    const ings=await getIngredients();
    if(!ings.length){alert(t('msg_no_ingredients'));return;}
    // CSV
    let csv='\uFEFFName;Einheit;Preis;Kategorie;Abschnitt(%);Kochfaktor;Verarbeitungshinweis;Lagerhinweis;Allergene;Tags\n';
    ings.forEach(i=>{
      const allergenStr=(i.allergens||[]).map(a=>a.name).join(', ');
      const tagStr=(i.tags||[]).map(t=>t.name).join(', ');
      const kfStr=(i.kochfaktor&&i.kochfaktor!==1)?String(i.kochfaktor).replace('.',','):'';
      csv+=`${i.name};${i.unit};${i.price?String(i.price).replace('.',','):''};${i.subcategory||''};${i.abschnitt||''};${kfStr};${i.verarbeitungshinweis||''};${i.lagerhinweis||''};${allergenStr};${tagStr}\n`;
    });
    // TXT
    let txt='=== ZUTATENLISTE ===\n';
    txt+=`${ings.length} Zutaten\n\n`;
    const groups={};
    ings.forEach(i=>{const cat=i.subcategory||'Ohne Kategorie';(groups[cat]=groups[cat]||[]).push(i);});
    Object.keys(groups).sort().forEach(cat=>{
      txt+=`--- ${cat} ---\n`;
      groups[cat].forEach(i=>{
        txt+=`  ${i.name} (${i.unit})`;
        if(i.price) txt+=`  —  ${i.price.toFixed(2)} €/E.`;
        if(i.abschnitt) txt+=`  —  Abschnitt: ${i.abschnitt}%`;
        if(i.verarbeitungshinweis) txt+=`  [V: ${i.verarbeitungshinweis}]`;
        if(i.lagerhinweis) txt+=`  [L: ${i.lagerhinweis}]`;
        if(i.allergens&&i.allergens.length) txt+=`  ⚠ ${i.allergens.map(a=>a.name).join(', ')}`;
        if(i.tags&&i.tags.length) txt+=`  🏷 ${i.tags.map(t=>t.name).join(', ')}`;
        txt+='\n';
      });
      txt+='\n';
    });
    txt+='=== ENDE ===\n';
    // Dialog
    const modal=showModal(h('div',{},
      h('h2',{},t('dlg_export_ingredients')),
      h('div',{style:{fontSize:'13px',color:'var(--text-muted)',marginBottom:'12px'}},t('dlg_ingredients_export_count',ings.length)),
      h('div',{class:'modal-buttons'},
        h('button',{class:'btn btn-surface',onClick:()=>{downloadFile('Zutaten.txt',txt);closeModal(modal);}},t('btn_export_txt')),
        h('button',{class:'btn btn-surface',onClick:()=>{downloadFile('Zutaten.csv',csv,'text/csv');closeModal(modal);}},t('btn_export_csv')),
        h('button',{class:'btn btn-surface',onClick:()=>closeModal(modal)},t('btn_cancel'))
      )
    ));
  }
