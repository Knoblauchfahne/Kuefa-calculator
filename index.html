      rowEl.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';rowEl.style.borderTop='2px solid var(--accent)';});
      rowEl.addEventListener('dragleave',()=>{rowEl.style.borderTop='';});
      rowEl.addEventListener('drop',e=>{
        e.preventDefault();rowEl.style.borderTop='';
        if(!dragSrcRow||dragSrcRow===rowEl) return;
        const srcWrapper=dragSrcRow.parentElement;

        if(srcWrapper&&tgtWrapper&&srcWrapper!==tgtWrapper) ingRowsDiv.insertBefore(srcWrapper,tgtWrapper);

        const newOrder=[];wrappers.forEach(w=>{const r=ingRows.find(x=>x.el===w);if(r) newOrder.push(r);});

      const dragHandle=h('span',{style:{cursor:'grab',fontSize:'14px',color:'var(--text-muted)',flexShrink:0,userSelect:'none'}},'⠿');
      const optBadge=h('span',{style:{fontSize:'10px',padding:'1px 6px',borderRadius:'8px',background:optionalRef.value?'var(--accent-dim)':'transparent',color:optionalRef.value?'var(--accent)':'transparent',cursor:'pointer',userSelect:'none',border:optionalRef.value?'1px solid var(--accent)':'1px solid transparent',whiteSpace:'nowrap'},onClick:()=>{
        optionalRef.value=!optionalRef.value;

      const subPanel=h('div',{style:{display:'none',paddingLeft:'30px',paddingTop:'4px',paddingBottom:'4px',borderLeft:'2px solid var(--accent-dim)'}});
      function renderSubPanel(){

        {name:'Kartoffel (mittel)',factor:0.15,unit:'kg'},
        {name:'Karotte (mittel)',factor:0.1,unit:'kg'},
        {name:'Tomate (mittel)',factor:0.12,unit:'kg'},
        {name:'Apfel (mittel)',factor:0.15,unit:'kg'},
        {name:'Zitrone',factor:0.08,unit:'kg'},
        {name:'Banane',factor:0.12,unit:'kg'},
        {name:'Paprika',factor:0.15,unit:'kg'},
      ]}
    ];
    const flatConv=[];
    conversions.forEach(g=>{
      convFrom.appendChild(h('option',{value:'',disabled:true,style:{fontWeight:'700',color:'var(--accent)'}},`── ${g.group} ──`));
      g.items.forEach(c=>{convFrom.appendChild(h('option',{value:c.name},c.name));flatConv.push(c);});
    });
    convFrom.value=flatConv[0].name;
    function updateConv(){
      const val=parseFloat(convInput.value)||0;
      const conv=flatConv.find(c=>c.name===convFrom.value);
      if(!conv){convResult.textContent='—';return;}
      const result=Math.round(val*conv.factor*10000)/10000;
      convResult.textContent=`${val} × ${conv.name} = ${result} ${conv.unit}`;
    }
    convInput.addEventListener('input',updateConv);
    convFrom.addEventListener('change',updateConv);
    side.append(convInput,convFrom,convResult);
    updateConv();

    const mainDiv=h('div',{class:'modal-main'});
    mainDiv.appendChild(content);
    const wrapper=h('div',{});
    wrapper.append(mainDiv,side);
    const modal=showModal(wrapper,'modal-with-side');

  function exportRecipe(recipe){
    const text=exportRecipeToText(recipe);

  async function duplicateRecipe(recipe){
    const catIds=recipe.categories.map(c=>c.id);
    const ingsData=recipe.ingredients.map(i=>({ingredient_id:i.ingredient_id,quantity_per_person:i.quantity_per_person,unit:i.unit,preparation:i.preparation||'',optional:i.optional||false,substitutes:(i.substitutes||[]).map(s=>({ingredient_id:s.ingredient_id,quantity_per_person:s.quantity_per_person,unit:s.unit,preparation:s.preparation||''}))}));
    const extra={zubereitung_zeit:recipe.zubereitung_zeit||'',garzeit:recipe.garzeit||'',zubereitung:recipe.zubereitung||'',hinweis:recipe.hinweis||'',allergen_hinweis:recipe.allergen_hinweis||'',is_allergy_friendly:recipe.is_allergy_friendly||false,allergenIds:recipe.manualAllergenIds||[],tagIds:(recipe.tags||[]).map(t=>t.id)};
    const newId=await createRecipe(recipe.name+' (Kopie)',recipe.description||'',catIds,ingsData,extra);

  async function importRecipes(){
    const modal=showModal(h('div',{},
      h('h2',{},'Rezepte importieren'),
      h('div',{style:{fontSize:'13px',color:'var(--text-muted)',marginBottom:'12px'}},'Wie sollen bestehende Rezepte (gleicher Name) behandelt werden?'),
      h('div',{class:'modal-buttons',style:{flexDirection:'column',gap:'8px'}},
        h('button',{class:'btn btn-surface',onClick:()=>{closeModal(modal);doImportRecipes(false);}},'Nur neue hinzufügen (bestehende behalten)'),
        h('button',{class:'btn btn-accent',onClick:()=>{closeModal(modal);doImportRecipes(true);}},'Bestehende überschreiben'),
        h('button',{class:'btn btn-surface',onClick:()=>closeModal(modal)},'Abbrechen')
      )
    ));
  }
  async function doImportRecipes(overwrite){
    const input=document.createElement('input');input.type='file';input.accept='.txt';input.multiple=true;
    input.onchange=async()=>{
      let totalAdded=0,totalUpdated=0,totalSkipped=0;
      for(const file of input.files){
        const text=await file.text();
        const {added,updated,skipped}=await importRecipeFromText(text,overwrite);
        totalAdded+=added;totalUpdated+=updated;totalSkipped+=skipped;
      }
      let msg=`Import abgeschlossen:\n${totalAdded} Rezept(e) neu hinzugefügt`;
      if(totalUpdated) msg+=`\n${totalUpdated} Rezept(e) aktualisiert`;
      if(totalSkipped) msg+=`\n${totalSkipped} Rezept(e) übersprungen (bereits vorhanden)`;
      alert(msg);
      renderList();renderDetail();
    };
    input.click();
  }

  async function managePreparationMethods(){
    const content=h('div',{});
    content.appendChild(h('h2',{},'Verarbeitungsmethoden'));
    const addRow=h('div',{style:{display:'flex',gap:'8px',marginBottom:'12px'}});
    const newInput=h('input',{type:'text',placeholder:'Neue Methode (z.B. gewürfelt, julienne...)',style:{flex:1}});
    addRow.append(newInput,h('button',{class:'btn btn-accent btn-sm',onClick:async()=>{
      const v=newInput.value.trim();if(!v) return;
      try{await createPreparationMethod(v);}catch(e){alert('Methode existiert bereits');}
      newInput.value='';refresh();
    }},'+'));
    content.appendChild(addRow);
    const listDiv2=h('div',{});content.appendChild(listDiv2);
    content.appendChild(h('div',{style:{marginTop:'16px',textAlign:'center'}},h('button',{class:'btn btn-surface',onClick:()=>closeModal(modal)},'Schließen')));
    const modal=showModal(content);
    async function refresh(){
      listDiv2.innerHTML='';
      (await getPreparationMethods()).forEach(m=>{
        const row=h('div',{class:'subcat-row'});
        row.appendChild(h('span',{style:{fontSize:'13px'}},m.name));
        const btns=h('span',{style:{display:'flex',gap:'4px'}});
        btns.appendChild(h('button',{class:'btn-icon btn-ghost',onClick:async()=>{
          const newName=prompt('Neuer Name:',m.name);
          if(newName&&newName.trim()&&newName.trim()!==m.name){await updatePreparationMethod(m.id,newName.trim());refresh();}
        }},'✎'));
        btns.appendChild(h('button',{class:'btn-icon btn-danger',onClick:async()=>{if(confirm(`"${m.name}" löschen?`)){await deletePreparationMethod(m.id);refresh();}}},'✕'));
        row.appendChild(btns);
        listDiv2.appendChild(row);
      });
    }
    refresh();
  }

  renderList();renderDetail();
}

  async function printRecipes(){

    const overviewPage=`<div class="recipe-page">

        <div class="recipe-title">${actionName||'Kochaktion'}</div>
        <div class="meta-row">${actionDesc?`<span>${actionDesc}</span>`:''}<span>${dayIds.length} Kochtag${dayIds.length!==1?'e':''}</span><span>${totalRecipes} Rezeptzuweisungen</span><span class="portions-badge">${totalPortions} Portionen gesamt</span></div>

        <tbody>${overviewRows}</tbody>
      </table>
    </div>`;

    // === RECIPE PAGES ===
    let pages=overviewPage;
    for(const a of assignments){
      const recipe=allRecipes.find(r=>r.id===a.recipe_id);
      if(!recipe) continue;
      const portions=a.portion_override||a.portion_count;
      const dateStr=a.date?formatDate(a.date):'';
      const typeLabel=a.is_allergy?'Allergie-Essen':a.is_side?'Beilage':'Rezept';
      const reqIngs=recipe.ingredients.filter(i=>!i.optional);
      const optIngs=recipe.ingredients.filter(i=>i.optional);
      const hasAb=recipe.ingredients.some(i=>(i.ingredient_abschnitt||0)>0);
      const hasKf=recipe.ingredients.some(i=>(i.ingredient_kochfaktor||1)!==1);
      const colSpan=4+(hasAb?1:0)+(hasKf?1:0);
      function ingTr(ing,style=''){
        const total=Math.round((ing.quantity_per_person||0)*portions*100)/100;
        const totalStr=String(total).replace('.',',');
        const perPStr=String(ing.quantity_per_person||0).replace('.',',');
        const ab=ing.ingredient_abschnitt||0;
        const netto=total*(1-ab/100);
        let nettoTd='';
        if(hasAb){const nettoR=Math.round(netto*100)/100;const nettoStr=String(nettoR).replace('.',',');nettoTd=ab>0?`<td style="text-align:right;color:#2d6a4f">${nettoStr} ${ing.unit}</td>`:`<td style="text-align:right;color:#aaa">—</td>`;}
        let kfTd='';
        if(hasKf){const kf=ing.ingredient_kochfaktor||1;const cooked=Math.round(netto*kf*100)/100;const cookedStr=String(cooked).replace('.',',');kfTd=kf!==1?`<td style="text-align:right;color:#40916c">${cookedStr} ${ing.unit}</td>`:`<td style="text-align:right;color:#aaa">—</td>`;}
        return `<tr${style}><td>${ing.ingredient_name}</td><td>${ing.preparation||'—'}</td><td style="text-align:right">${perPStr} ${ing.unit}</td><td style="text-align:right;font-weight:700">${totalStr} ${ing.unit}</td>${nettoTd}${kfTd}</tr>`;
      }
      const aSubs=a.substitutions||{};
      function ingTrWithSub(ing,style=''){
        const subChoice=aSubs[String(ing.id)];
        if(subChoice&&subChoice.ingredient_name){
          let row=ingTr({...ing,ingredient_name:subChoice.ingredient_name,quantity_per_person:subChoice.quantity_per_person,unit:subChoice.unit||ing.unit,preparation:subChoice.preparation||ing.preparation},style);
          row+=`<tr${style}><td colspan="${colSpan}" style="font-size:9px;color:#888;padding:2px 10px;font-style:italic">⇄ statt ${ing.ingredient_name}</td></tr>`;
          return row;
        }
        return ingTr(ing,style);
      }
      let ingRows='';
      for(const ing of reqIngs) ingRows+=ingTrWithSub(ing);
      if(optIngs.length){
        ingRows+=`<tr><td colspan="${colSpan}" style="background:#f5f5f5;font-style:italic;font-size:10px;color:#888;padding:4px 10px">Optionale Zutaten</td></tr>`;

      const costStr=totalCost.toFixed(2).replace('.',',')+' €';

      pages+=`<div class="recipe-page">

        </div>
        <table>
          <thead><tr><th>Zutat</th><th>Verarbeitung</th><th>Menge / Port.</th><th>Gesamtmenge</th>${hasAb?'<th>Netto</th>':''}${hasKf?'<th>Gekocht</th>':''}</tr></thead>
          <tbody>${ingRows}</tbody>

    }

<style>

    const win=window.open('','_blank');

  // Day order groups
  const dayFilterCard=h('div',{class:'card',style:{marginBottom:'12px'}});

    if(!days.length){dayFilterBody.appendChild(h('span',{style:{fontSize:'12px',color:'var(--text-muted)'}},'Keine Kochtage vorhanden'));return;}

      const numEl=h('span',{style:{display:'inline-flex',alignItems:'center',justifyContent:'center',width:'22px',height:'22px',borderRadius:'50%',background:groupColors[0],color:'#fff',fontWeight:'700',fontSize:'12px',flexShrink:0}},'1');

  const cols=h('div',{class:'two-col'});

  async function renderAssignments(){
    assignDiv.innerHTML='';
    assignDiv.appendChild(h('div',{style:{fontWeight:'700',fontSize:'14px',marginBottom:'8px'}},'Rezeptzuweisungen'));
    if(!selectedActionId){assignDiv.appendChild(h('div',{class:'empty-msg'},'Bitte zuerst eine Kochaktion anlegen'));return;}

    if(!slots.length){assignDiv.appendChild(h('div',{class:'empty-msg'},'Bitte zuerst Mahlzeiten anlegen'));return;}

        const sideAssigns=slotAssigns.filter(a=>!!a.is_side&&!a.is_allergy);
        const allergyAssigns=slotAssigns.filter(a=>!!a.is_allergy);

        function renderGroup(groupAssigns,label,isAllergyGroup=false){
          if(groupAssigns.length||true){
            const portInputs=[];
            const hint=h('div',{style:{fontSize:'11px',padding:'2px 0 0',textAlign:'right'}});
            function updateHint(){
              const sum=portInputs.reduce((s,inp)=>s+(parseInt(inp.value)||0),0);
              if(isAllergyGroup){
                hint.style.color='var(--green)';
                hint.textContent=`Σ ${sum} Allergie-Portionen`;
              } else {
                const ok=sum===slot.portion_count;
                hint.style.color=ok?'var(--green-light)':'var(--accent)';
                hint.textContent=`Σ ${sum} / ${slot.portion_count} Portionen${ok?'  ✓':' ⚠'}`;
              }

            if(groupAssigns.length){
              const labelStyle=isAllergyGroup?{fontSize:'11px',fontWeight:'700',color:'var(--green)',margin:'6px 0 2px'}:{fontSize:'11px',fontWeight:'700',color:'var(--text-muted)',margin:'6px 0 2px'};

              const aRow=h('div',{class:'assign-recipe',style:{display:'flex',alignItems:'center',gap:'6px'}});
              const nameSpan=h('span',{style:{flex:1,fontSize:'12px',color:isAllergyGroup?'var(--green)':'inherit'}},`→ ${a.recipe_name}`);
              if(a.substitutions&&Object.keys(a.substitutions).length){
                const subCount=Object.keys(a.substitutions).length;
                nameSpan.appendChild(h('span',{style:{marginLeft:'6px',fontSize:'10px',padding:'1px 6px',borderRadius:'8px',background:'var(--accent-dim)',color:'var(--accent)',cursor:'help'},title:`${subCount} Substitution(en) aktiv`},'⇄ '+subCount));
              }
              aRow.appendChild(nameSpan);
              const portInput=h('input',{type:'number',value:a.portion_override||a.portion_count,style:{width:'60px',textAlign:'center',fontSize:'12px'},title:'Portionen'});
              portInput.addEventListener('input',updateHint);
              portInput.addEventListener('change',async()=>{
                const v=parseInt(portInput.value);if(v>0) await updateAssignmentPortions(a.id,v);
              });
              portInputs.push(portInput);
              aRow.appendChild(portInput);
              aRow.appendChild(h('span',{style:{fontSize:'11px',color:'var(--text-muted)'}},'Port.'));
              aRow.appendChild(h('button',{class:'btn-icon btn-danger',style:{width:'24px',height:'24px',fontSize:'10px'},onClick:async()=>{await removeAssignment(a.id);renderAssignments();}},'✕'));
              slotDiv.appendChild(aRow);
            });
            if(groupAssigns.length>1||(isAllergyGroup&&groupAssigns.length>=1)){
              updateHint();
              slotDiv.appendChild(hint);
            }
          }
        }

        renderGroup(recipeAssigns,'Rezepte');
        renderGroup(sideAssigns,'Beilagen');
        renderGroup(allergyAssigns,'Allergie-Essen',true);

        const btnRow=h('div',{style:{display:'flex',gap:'4px',marginTop:'4px',flexWrap:'wrap'}});

        btnRow.appendChild(h('button',{class:'btn btn-ghost btn-sm',style:{flex:1,color:'var(--green)'},onClick:()=>allergyAssignDialog(slot.id,slot.meal_type,slot.portion_count)},'+  Allergie-Essen'));
        slotDiv.appendChild(btnRow);

      });
    });
  }

const ALL_STORES=['actions','cooking_days','meal_slots','ingredients','subcategories','standard_meals','meal_components','categories','recipes','recipe_categories','recipe_ingredients','assignments','preparation_methods','meal_type_categories','allergens','ingredient_allergens','recipe_allergens','tags','recipe_tags','ingredient_tags','recipe_ingredient_substitutes'];
// Stores, die zu konkreten Kochaktionen / Planungen gehören und beim Laden des Standard-Datenbestands bewahrt werden sollen
const ACTION_STORES=['actions','cooking_days','meal_slots','assignments'];

async function exportFullDatabase(){
  const data={_meta:{version:DB_VERSION,exported_at:new Date().toISOString(),app:'KF Portionsrechner'}};
  for(const store of ALL_STORES){
    try{data[store]=await dbGetAll(store);}catch(e){data[store]=[];}
  }
  return JSON.stringify(data,null,2);
}

// ── Teilbarer Aktions-Export ──────────────────────────────────
// Exportiert eine oder alle Aktionen inkl. aller abhängigen Daten (Tage, Slots, Zuweisungen).
// Nur zum Teilen mit anderen Menschen im Team gedacht, nicht als Vollbackup.
async function exportActions(actionIds=null){
  const allActions=await dbGetAll('actions');
  const targetActions=actionIds?allActions.filter(a=>actionIds.includes(a.id)):allActions;
  const targetActionIdSet=new Set(targetActions.map(a=>a.id));
  const allDays=await dbGetAll('cooking_days');
  const targetDays=allDays.filter(d=>targetActionIdSet.has(d.action_id));
  const targetDayIdSet=new Set(targetDays.map(d=>d.id));
  const allSlots=await dbGetAll('meal_slots');
  const targetSlots=allSlots.filter(s=>targetDayIdSet.has(s.cooking_day_id));
  const targetSlotIdSet=new Set(targetSlots.map(s=>s.id));
  const allAssignments=await dbGetAll('assignments');
  const targetAssignments=allAssignments.filter(a=>targetSlotIdSet.has(a.meal_slot_id));
  // Rezeptnamen mitspeichern, damit Empfänger fehlende Rezepte erkennen kann
  const recipeIds=[...new Set(targetAssignments.map(a=>a.recipe_id).filter(Boolean))];
  const recipeNames={};
  for(const rid of recipeIds){const r=await dbGet('recipes',rid);if(r) recipeNames[rid]=r.name;}
  return JSON.stringify({
    _meta:{version:DB_VERSION,exported_at:new Date().toISOString(),app:'KF Portionsrechner',type:'actions',action_count:targetActions.length},
    _recipe_names:recipeNames,
    actions:targetActions,
    cooking_days:targetDays,
    meal_slots:targetSlots,
    assignments:targetAssignments
  },null,2);
}

// Importiert Aktionen additiv: bestehende Aktionen bleiben, importierte bekommen neue IDs.
// Remapping: alte ID → neue ID für actions, cooking_days, meal_slots; Assignments bekommen die neuen slot_ids.
// recipe_id bleibt unverändert → wenn das Rezept nicht existiert, warnen wir.
async function importActions(json){
  const data=JSON.parse(json);
  if(!data._meta||data._meta.type!=='actions') throw new Error('Keine gültige Aktions-Datei (erwartet: type="actions")');
  const actionMap={},dayMap={},slotMap={};
  for(const action of (data.actions||[])){
    const oldId=action.id;const {id,...rest}=action;
    const newId=await dbAdd('actions',rest);
    actionMap[oldId]=newId;
  }
  for(const day of (data.cooking_days||[])){
    const oldId=day.id;const {id,...rest}=day;
    rest.action_id=actionMap[rest.action_id];
    if(!rest.action_id) continue;
    const newId=await dbAdd('cooking_days',rest);
    dayMap[oldId]=newId;
  }
  for(const slot of (data.meal_slots||[])){
    const oldId=slot.id;const {id,...rest}=slot;
    rest.cooking_day_id=dayMap[rest.cooking_day_id];
    if(!rest.cooking_day_id) continue;
    const newId=await dbAdd('meal_slots',rest);
    slotMap[oldId]=newId;
  }
  const myRecipes=await dbGetAll('recipes');
  const myRecipeIds=new Set(myRecipes.map(r=>r.id));
  const missingRecipes=new Set();
  let importedAssignments=0,skippedAssignments=0;
  for(const asn of (data.assignments||[])){
    const {id,...rest}=asn;
    rest.meal_slot_id=slotMap[rest.meal_slot_id];
    if(!rest.meal_slot_id){skippedAssignments++;continue;}
    if(rest.recipe_id&&!myRecipeIds.has(rest.recipe_id)){
      const name=(data._recipe_names||{})[rest.recipe_id]||`Rezept-ID ${rest.recipe_id}`;
      missingRecipes.add(name);
    }
    await dbAdd('assignments',rest);
    importedAssignments++;
  }
  return{
    actions:Object.keys(actionMap).length,
    days:Object.keys(dayMap).length,
    slots:Object.keys(slotMap).length,
    assignments:importedAssignments,
    assignmentsSkipped:skippedAssignments,
    missingRecipes:[...missingRecipes]
  };
}

// stores=null → alle Stores überschreiben (klassischer Import)
// stores=Array → nur angegebene Stores überschreiben, Rest bleibt unberührt
async function importFullDatabase(json,stores=null){
  const data=JSON.parse(json);
  if(!data._meta) throw new Error('Ungültige Datei — kein gültiges KF-Backup');
  const targetStores=stores||ALL_STORES;
  for(const store of targetStores){
    if(!data[store]) continue;
    // Clear store
    await new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const s=tx.objectStore(store);const r=s.clear();r.onsuccess=()=>res();r.onerror=e=>rej(e);});
    // Re-insert all records
    for(const record of data[store]){
      await new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const s=tx.objectStore(store);const r=s.put(record);r.onsuccess=()=>res();r.onerror=e=>rej(e);});
    }
  }
}

  importCard.appendChild(h('div',{style:{fontSize:'13px',color:'var(--text-muted)',marginBottom:'12px'}},'Importiert eine JSON-Datei mit allen Datenbankeinträgen. Achtung: Alle aktuellen Daten werden dabei überschrieben!'));
  const statusDiv=h('div',{style:{marginTop:'8px',fontSize:'13px'}});
  importCard.appendChild(h('button',{class:'btn btn-surface',onClick:()=>{
    const input=document.createElement('input');input.type='file';input.accept='.json';
    input.onchange=async()=>{
      if(!input.files.length) return;
      if(!confirm('Alle aktuellen Daten werden überschrieben! Fortfahren?')) return;
      try{
        const text=await input.files[0].text();
        await importFullDatabase(text);
        statusDiv.style.color='var(--green-light)';
        statusDiv.textContent='✓ Import erfolgreich! Seite wird neu geladen...';
        setTimeout(()=>location.reload(),1500);

        statusDiv.textContent='✕ Fehler: '+e.message;
      }
    };

  }},'📂  JSON-Datei auswählen'));
  importCard.appendChild(statusDiv);
  body.appendChild(importCard);

  // Standard backup from repo
  const defaultCard=h('div',{class:'card',style:{marginBottom:'16px'}});
  defaultCard.appendChild(h('div',{style:{fontWeight:'700',fontSize:'14px',marginBottom:'8px'}},'🌐  Standard-Datenbestand laden'));
  defaultCard.appendChild(h('div',{style:{fontSize:'13px',color:'var(--text-muted)',marginBottom:'12px'}},'Lädt den mitgelieferten Basis-Datenbestand (Standard-Rezepte, Zutaten, Allergene etc.) direkt vom GitHub-Repo. Deine Kochaktionen, Kochtage, Mahlzeit-Slots und Rezept-Zuweisungen bleiben dabei erhalten — überschrieben werden nur Rezepte, Zutaten und Stammdaten.'));
  const defaultStatus=h('div',{style:{marginTop:'8px',fontSize:'13px'}});
  defaultCard.appendChild(h('button',{class:'btn btn-surface',onClick:async()=>{
    if(!confirm('Rezepte, Zutaten und Stammdaten werden durch den Standard-Datenbestand ersetzt.\n\nKochaktionen, Kochtage, Mahlzeit-Slots und Rezept-Zuweisungen bleiben unverändert.\n\nFortfahren?')) return;
    defaultStatus.style.color='var(--text-muted)';
    defaultStatus.textContent='Lade standardbackup.json …';
    try{
      const resp=await fetch('standardbackup.json',{cache:'no-store'});
      if(!resp.ok) throw new Error('Datei nicht gefunden (HTTP '+resp.status+')');
      const text=await resp.text();
      // Nur Nicht-Aktions-Stores überschreiben
      const storesToImport=ALL_STORES.filter(s=>!ACTION_STORES.includes(s));
      await importFullDatabase(text,storesToImport);
      defaultStatus.style.color='var(--green-light)';
      defaultStatus.textContent='✓ Standard-Daten geladen! Seite wird neu geladen …';
      setTimeout(()=>location.reload(),1500);
    }catch(e){
      defaultStatus.style.color='var(--accent)';
      defaultStatus.textContent='✕ Fehler: '+e.message;
    }
  }},'🌐  Standard-Daten laden'));
  defaultCard.appendChild(defaultStatus);
  body.appendChild(defaultCard);

  // Action share export/import
  const shareCard=h('div',{class:'card',style:{marginBottom:'16px'}});
  shareCard.appendChild(h('div',{style:{fontWeight:'700',fontSize:'14px',marginBottom:'8px'}},'🤝  Kochaktionen teilen'));
  shareCard.appendChild(h('div',{style:{fontSize:'13px',color:'var(--text-muted)',marginBottom:'12px'}},'Exportiere eine einzelne oder alle Kochaktionen (inkl. Kochtage, Mahlzeit-Slots und Rezept-Zuweisungen) als JSON-Datei, um sie mit anderen Teammitgliedern zu teilen. Beim Import werden die Aktionen zu deinen vorhandenen hinzugefügt — nichts wird überschrieben. Damit die Rezept-Zuweisungen funktionieren, sollten beide Seiten den gleichen Rezept-Bestand haben (z.B. über „Standard-Daten laden").'));
  const allActionsForShare=await getActions();
  const actionSel=h('select',{class:'form-input',style:{width:'100%',marginBottom:'8px'}});
  actionSel.appendChild(h('option',{value:'all'},`Alle Kochaktionen (${allActionsForShare.length})`));
  allActionsForShare.forEach(a=>actionSel.appendChild(h('option',{value:String(a.id)},a.name)));
  const shareBtnRow=h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}});
  shareBtnRow.appendChild(h('button',{class:'btn btn-accent',onClick:async()=>{
    if(!allActionsForShare.length){alert('Keine Kochaktionen zum Exportieren vorhanden.');return;}
    const v=actionSel.value;
    const ids=(v==='all')?null:[parseInt(v)];
    try{
      const json=await exportActions(ids);
      const date=new Date().toISOString().slice(0,10);
      let fname;
      if(v==='all'){fname=`KF_Aktionen_${date}.json`;}
      else{const a=allActionsForShare.find(x=>String(x.id)===v);const safeName=(a?a.name:'Aktion').replace(/[^a-zA-Z0-9äöüÄÖÜß_-]+/g,'_');fname=`KF_Aktion_${safeName}_${date}.json`;}
      downloadFile(fname,json,'application/json');
    }catch(e){alert('Fehler beim Export: '+e.message);}
  }},'⬇  Exportieren'));
  const shareStatus=h('div',{style:{marginTop:'8px',fontSize:'13px'}});
  shareBtnRow.appendChild(h('button',{class:'btn btn-surface',onClick:()=>{
    const input=document.createElement('input');input.type='file';input.accept='.json';
    input.onchange=async()=>{
      if(!input.files.length) return;
      try{
        const text=await input.files[0].text();
        const result=await importActions(text);
        let msg=`✓ Import abgeschlossen: ${result.actions} Aktion${result.actions===1?'':'en'}, ${result.days} Tag${result.days===1?'':'e'}, ${result.slots} Slots, ${result.assignments} Zuweisungen`;
        if(result.assignmentsSkipped) msg+=` — ${result.assignmentsSkipped} Zuweisungen übersprungen`;
        if(result.missingRecipes.length) msg+=` — ⚠ ${result.missingRecipes.length} Rezept(e) fehlen in deiner Datenbank: ${result.missingRecipes.slice(0,5).join(', ')}${result.missingRecipes.length>5?' …':''}`;
        shareStatus.style.color=result.missingRecipes.length?'var(--accent)':'var(--green-light)';
        shareStatus.textContent=msg;
        setTimeout(()=>location.reload(),result.missingRecipes.length?4000:1500);
      }catch(e){
        shareStatus.style.color='var(--accent)';
        shareStatus.textContent='✕ Fehler: '+e.message;
      }
    };
    input.click();
  }},'📂  Importieren'));
  shareCard.appendChild(actionSel);

  shareCard.appendChild(shareStatus);
  body.appendChild(shareCard);

  // Update check
  const updateCard=h('div',{class:'card',style:{marginBottom:'16px'}});
  updateCard.appendChild(h('div',{style:{fontWeight:'700',fontSize:'14px',marginBottom:'8px'}},'🔄  App-Update'));
  updateCard.appendChild(h('div',{style:{fontSize:'13px',color:'var(--text-muted)',marginBottom:'12px'}},'Die App prüft beim Start automatisch, ob eine neue Version vorliegt, und zeigt ggf. ein Banner. Falls du ganz sicher gehen willst, kannst du hier manuell suchen. Funktioniert nur online.'));
  const updateStatus=h('div',{style:{marginTop:'8px',fontSize:'13px'}});

    updateStatus.style.color='var(--text-muted)';

    if(r.updateAvailable){
      updateStatus.style.color='var(--green-light)';
      updateStatus.textContent='✓ Neue Version gefunden! Seite wird neu geladen …';
      setTimeout(()=>location.reload(),1200);
    }else if(r.reason==='no-sw'){
      updateStatus.style.color='var(--accent)';
      updateStatus.textContent='✕ Service Worker nicht aktiv (lokale Datei? Private Browsersitzung?). Updates nur auf der GitHub-Pages-Version möglich.';

      updateStatus.style.color='var(--accent)';
      updateStatus.textContent='✕ Netzwerkfehler — bist du online?';
    }else{
      updateStatus.style.color='var(--green-light)';
      updateStatus.textContent='✓ Du hast bereits die aktuellste Version.';
    }
  }},'🔄  Nach Updates suchen'));
  updateCard.appendChild(updateStatus);
  body.appendChild(updateCard);

  // Database info
  const infoCard=h('div',{class:'card',style:{marginBottom:'16px'}});
  infoCard.appendChild(h('div',{style:{fontWeight:'700',fontSize:'14px',marginBottom:'12px'}},'📊  Datenbank-Übersicht'));
  const infoTable=h('div',{});
  const storeLabels={actions:'Kochaktionen',cooking_days:'Kochtage',meal_slots:'Mahlzeit-Slots',ingredients:'Zutaten',subcategories:'Kategorien',standard_meals:'Standardmahlzeiten',meal_components:'Mahlzeit-Komponenten',categories:'Rezept-Kategorien',recipes:'Rezepte',recipe_categories:'Rezept-Kategorie-Zuordnungen',recipe_ingredients:'Rezept-Zutaten',assignments:'Rezeptzuweisungen',preparation_methods:'Verarbeitungsmethoden',meal_type_categories:'Mahlzeit-Typen',allergens:'Allergene',ingredient_allergens:'Zutaten-Allergene',recipe_allergens:'Rezept-Allergene',tags:'Tags',recipe_tags:'Rezept-Tags',ingredient_tags:'Zutaten-Tags',recipe_ingredient_substitutes:'Rezept-Substitutionen'};
  async function refreshInfoTable(){
    infoTable.innerHTML='';
    for(const store of ALL_STORES){
      try{
        const items=await dbGetAll(store);
        const row=h('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'4px 0',borderBottom:'1px solid var(--border)'}});
        row.appendChild(h('span',{style:{fontSize:'13px',flex:1}},storeLabels[store]||store));
        row.appendChild(h('span',{style:{fontSize:'13px',color:'var(--text-muted)',minWidth:'80px',textAlign:'right'}},`${items.length} Einträge`));
        if(items.length>0){
          row.appendChild(h('button',{class:'btn btn-danger btn-sm',style:{marginLeft:'8px',fontSize:'11px',padding:'2px 8px'},onClick:async()=>{
            if(!confirm(`Alle ${items.length} Einträge in "${storeLabels[store]||store}" löschen?`)) return;
            await new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const s=tx.objectStore(store);const r=s.clear();r.onsuccess=()=>res();r.onerror=e=>rej(e);});
            refreshInfoTable();
          }},'🗑'));
        }else{
          row.appendChild(h('span',{style:{width:'37px'}}));
        }
        infoTable.appendChild(row);
      }catch(e){}
    }
  }
  await refreshInfoTable();
  infoCard.appendChild(infoTable);
  body.appendChild(infoCard);

  // Danger zone
  const dangerCard=h('div',{class:'card',style:{borderColor:'var(--accent)'}});
  dangerCard.appendChild(h('div',{style:{fontWeight:'700',fontSize:'14px',marginBottom:'8px',color:'var(--accent)'}},'⚠  Gefahrenzone'));
  dangerCard.appendChild(h('div',{style:{fontSize:'13px',color:'var(--text-muted)',marginBottom:'12px'}},'Löscht alle Daten unwiderruflich. Erstelle vorher ein Backup!'));
  dangerCard.appendChild(h('button',{class:'btn btn-danger',onClick:async()=>{
    if(!confirm('ALLE Daten werden gelöscht! Bist du sicher?')) return;
    if(!confirm('Wirklich ALLES löschen? Das kann nicht rückgängig gemacht werden!')) return;
    for(const store of ALL_STORES){
      await new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const s=tx.objectStore(store);const r=s.clear();r.onsuccess=()=>res();r.onerror=e=>rej(e);});
    }
    alert('Alle Daten gelöscht.');
    location.reload();
  }},'🗑  Alle Daten löschen'));
  body.appendChild(dangerCard);
}

const SEASON_MONTHS=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

function renderSeasonCalendarPage(container){
  const header=h('div',{class:'page-header'},h('h1',{},'Saisonkalender'));
  const body=h('div',{class:'page-body'});
  container.append(header,body);

  const currentMonth=new Date().getMonth(); // 0-11

  // Legend + controls
  const topCard=h('div',{class:'card',style:{marginBottom:'16px'}});
  const topRow=h('div',{style:{display:'flex',gap:'12px',alignItems:'center',flexWrap:'wrap',marginBottom:'12px'}});
  const searchInput=h('input',{type:'text',class:'search-input',placeholder:'Suche nach Obst/Gemüse/Kraut...',style:{flex:'1',minWidth:'200px'}});
  const catFilter=h('select',{class:'form-input',style:{width:'auto',minWidth:'140px'}},
    h('option',{value:''},'Alle Kategorien'),
    h('option',{value:'Gemüse'},'Nur Gemüse'),
    h('option',{value:'Obst'},'Nur Obst'),
    h('option',{value:'Kräuter'},'Nur Kräuter')
  );
  const seasonFilter=h('select',{class:'form-input',style:{width:'auto',minWidth:'160px'}},
    h('option',{value:''},'Alle Einträge'),
    h('option',{value:'current'},'Aktuell in Saison'),
    h('option',{value:'fresh'},'Nur Freiland-Saison')
  );
  topRow.append(searchInput,catFilter,seasonFilter);
  topCard.appendChild(topRow);

  // Legend
  const legend=h('div',{style:{display:'flex',gap:'16px',flexWrap:'wrap',fontSize:'12px',color:'var(--text-muted)'}});
  legend.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
    h('span',{style:{display:'inline-block',width:'18px',height:'14px',background:'#2d6a4f',borderRadius:'3px'}}),
    h('span',{},'Frisch / Freiland')));
  legend.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
    h('span',{style:{display:'inline-block',width:'18px',height:'14px',background:'#b08d3b',borderRadius:'3px'}}),
    h('span',{},'Aus Lager')));
  legend.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
    h('span',{style:{display:'inline-block',width:'18px',height:'14px',background:'var(--surface3)',borderRadius:'3px',border:'1px solid var(--border)'}}),
    h('span',{},'Nicht verfügbar')));
  legend.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
    h('span',{style:{display:'inline-block',width:'18px',height:'14px',background:'transparent',border:'2px solid var(--accent)',borderRadius:'3px'}}),
    h('span',{},`Aktueller Monat (${SEASON_MONTHS[currentMonth]})`)));
  topCard.appendChild(legend);
  body.appendChild(topCard);

  // Table card
  const tableCard=h('div',{class:'card',style:{padding:'0',overflow:'auto'}});
  body.appendChild(tableCard);

  function buildRow(item){
    const row=h('div',{class:'season-row',style:{display:'flex',alignItems:'center',borderBottom:'1px solid var(--border)',minHeight:'32px'}});
    const nameCell=h('div',{style:{width:'170px',minWidth:'170px',padding:'6px 10px',fontSize:'13px',fontWeight:'500',position:'sticky',left:'0',background:'var(--surface)',zIndex:'1',borderRight:'1px solid var(--border)'}},item.name);
    row.appendChild(nameCell);
    for(let m=0;m<12;m++){
      const state=item.months[m];
      const bg=state===2?'#2d6a4f':state===1?'#b08d3b':'transparent';
      const cell=h('div',{style:{
        flex:'1',minWidth:'36px',height:'28px',margin:'2px',borderRadius:'3px',
        background:bg,
        border:state===0?'1px solid var(--border)':'none',
        boxShadow:m===currentMonth?'0 0 0 2px var(--accent)':'none',
        cursor:'default'
      },title:`${item.name} – ${SEASON_MONTHS[m]}: ${state===2?'Frisch':state===1?'Aus Lager':'Nicht verfügbar'}`});
      row.appendChild(cell);
    }
    return row;
  }

  function renderTable(){
    tableCard.innerHTML='';
    // Header row
    const hdr=h('div',{style:{display:'flex',alignItems:'center',borderBottom:'2px solid var(--border)',position:'sticky',top:'0',background:'var(--surface)',zIndex:'2'}});
    hdr.appendChild(h('div',{style:{width:'170px',minWidth:'170px',padding:'8px 10px',fontSize:'12px',fontWeight:'700',color:'var(--text-muted)',position:'sticky',left:'0',background:'var(--surface)',zIndex:'1',borderRight:'1px solid var(--border)'}},'Name'));
    SEASON_MONTHS.forEach((m,i)=>{
      hdr.appendChild(h('div',{style:{flex:'1',minWidth:'36px',textAlign:'center',padding:'6px 2px',fontSize:'11px',fontWeight:i===currentMonth?'700':'500',color:i===currentMonth?'var(--accent)':'var(--text-muted)'}},m));
    });
    tableCard.appendChild(hdr);

    const q=searchInput.value.toLowerCase().trim();
    const cat=catFilter.value;
    const season=seasonFilter.value;
    let groups={'Gemüse':[],'Obst':[],'Kräuter':[]};
    SEASON_DATA.forEach(item=>{
      if(q&&!item.name.toLowerCase().includes(q)) return;
      if(cat&&item.cat!==cat) return;
      if(season==='current'&&item.months[currentMonth]===0) return;
      if(season==='fresh'&&item.months[currentMonth]!==2) return;
      groups[item.cat].push(item);
    });
    let any=false;
    for(const grp of ['Gemüse','Obst','Kräuter']){
      if(!groups[grp].length) continue;
      any=true;
      const grpHdr=h('div',{style:{padding:'10px 12px 6px',fontSize:'12px',fontWeight:'700',color:'var(--accent)',background:'var(--surface2)',borderBottom:'1px solid var(--border)',textTransform:'uppercase',letterSpacing:'.5px'}},grp);
      tableCard.appendChild(grpHdr);
      groups[grp].forEach(item=>tableCard.appendChild(buildRow(item)));
    }
    if(!any){
      tableCard.appendChild(h('div',{style:{padding:'20px',textAlign:'center',color:'var(--text-muted)'}},'Keine Einträge gefunden'));
    }
  }

  searchInput.addEventListener('input',renderTable);
  catFilter.addEventListener('change',renderTable);
  seasonFilter.addEventListener('change',renderTable);

//  SERVICE WORKER (Offline-Unterstützung)
// ══════════════════════════════════════════════════════════════
function showUpdateBanner(){
  if(document.getElementById('sw-update-banner')) return;
  const banner=h('div',{id:'sw-update-banner',style:{position:'fixed',left:'50%',transform:'translateX(-50%)',bottom:'20px',background:'var(--accent)',color:'#fff',padding:'10px 16px',borderRadius:'8px',boxShadow:'0 4px 12px rgba(0,0,0,.3)',zIndex:'9999',display:'flex',gap:'12px',alignItems:'center',fontSize:'13px',maxWidth:'90vw'}},
    h('span',{},'Neue Version verfügbar'),
    h('button',{class:'btn btn-sm',style:{background:'#fff',color:'var(--accent)',border:'none'},onClick:()=>location.reload()},'Neu laden'),
    h('button',{class:'btn btn-sm',style:{background:'transparent',color:'#fff',border:'1px solid #fff'},onClick:()=>banner.remove()},'Später')
  );
  document.body.appendChild(banner);
}

// Aktive Update-Prüfung: fragt den SW per MessageChannel.
// Liefert {updateAvailable:bool, reason?:string}. reason='no-sw' wenn kein SW aktiv.
function swCheckForUpdate(timeoutMs=8000){
  return new Promise((resolve)=>{
    if(!('serviceWorker' in navigator)) return resolve({updateAvailable:false,reason:'no-sw'});
    navigator.serviceWorker.ready.then((reg)=>{
      const sw=reg.active||navigator.serviceWorker.controller;
      if(!sw) return resolve({updateAvailable:false,reason:'no-sw'});
      // Registrierung zusätzlich aktualisieren lassen (prüft sw.js auf Änderungen)
      try{reg.update();}catch(_){}
      const mc=new MessageChannel();
      const to=setTimeout(()=>resolve({updateAvailable:false,reason:'timeout'}),timeoutMs);
      mc.port1.onmessage=(e)=>{clearTimeout(to);resolve(e.data||{updateAvailable:false});};
      sw.postMessage({type:'CHECK_UPDATE'},[mc.port2]);
    }).catch(()=>resolve({updateAvailable:false,reason:'no-sw'}));
  });
}

if('serviceWorker' in navigator){
  // WICHTIG: Listener synchron registrieren, damit keine Nachrichten
  // verloren gehen, die der SW während des initialen Fetch schon feuert.
  navigator.serviceWorker.addEventListener('message',(e)=>{
    if(e.data&&e.data.type==='SW_UPDATE_AVAILABLE') showUpdateBanner();
  });
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(()=>{
      // Nach dem Start aktiv prüfen, ob eine neue Version vorliegt.
      // Kleine Verzögerung, damit der SW sicher aktiv ist.
      setTimeout(()=>{
        swCheckForUpdate().then(r=>{if(r&&r.updateAvailable) showUpdateBanner();});
      },2000);
    }).catch(err=>console.warn('SW-Registrierung fehlgeschlagen:',err));
  });
}
